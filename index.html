/* ─────────────────────────────────────────────────────────────
   MAXIMUS PRO · V2 Design System
   Editorial-luxe minimal · iPad-first · whisper-quiet motion
   ───────────────────────────────────────────────────────────── */

:root {
  /* ── Type ── */
  --font-sans: 'Inter Tight', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  --font-serif: 'Fraunces', 'Times New Roman', Georgia, serif;
  --font-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;

  /* ── Motion ── */
  --ease-out: cubic-bezier(.16, 1, .3, 1);
  --ease-in-out: cubic-bezier(.65, 0, .35, 1);
  --ease-spring: cubic-bezier(.34, 1.56, .64, 1);
  --d-quick: 120ms;
  --d-mid: 200ms;
  --d-slow: 320ms;

  /* ── Radius ── */
  --r-xs: 6px;
  --r-sm: 10px;
  --r-md: 14px;
  --r-lg: 20px;
  --r-xl: 28px;
  --r-pill: 999px;

  /* ── Spacing scale ── */
  --s-1: 4px; --s-2: 8px; --s-3: 12px; --s-4: 16px;
  --s-5: 20px; --s-6: 24px; --s-7: 32px; --s-8: 40px;
  --s-9: 56px; --s-10: 72px;
}

/* ── LIGHT (editorial luxe) ── */
:root, [data-theme="light"] {
  --bg: #FAFAF7;
  --bg-soft: #F2F2EE;
  --surface: #FFFFFF;
  --surface-2: #FAFAF7;
  --surface-glass: rgba(255, 255, 255, .72);
  --ink: #0A0A0B;
  --ink-2: #2A2A2E;
  --ink-muted: #6B6B70;
  --ink-soft: #A0A0A6;
  --line: rgba(10, 10, 11, .08);
  --line-2: rgba(10, 10, 11, .14);
  --accent: #0A0A0B;
  --accent-warm: #B8956A;
  --accent-warm-soft: rgba(184, 149, 106, .14);
  --success: #2D7A4A;
  --success-soft: rgba(45, 122, 74, .12);
  --danger: #B83A3A;
  --danger-soft: rgba(184, 58, 58, .10);
  --warning: #B8721F;
  --warning-soft: rgba(184, 114, 31, .12);
  --info: #2A5C8F;
  --info-soft: rgba(42, 92, 143, .12);
  --shadow-xs: 0 1px 2px rgba(10, 10, 11, .04);
  --shadow-sm: 0 1px 3px rgba(10, 10, 11, .05), 0 1px 2px rgba(10, 10, 11, .03);
  --shadow-md: 0 4px 14px rgba(10, 10, 11, .06), 0 1px 3px rgba(10, 10, 11, .04);
  --shadow-lg: 0 12px 40px rgba(10, 10, 11, .08), 0 2px 8px rgba(10, 10, 11, .04);
  --shadow-xl: 0 32px 80px rgba(10, 10, 11, .14), 0 8px 24px rgba(10, 10, 11, .08);
  --ring: 0 0 0 3px rgba(184, 149, 106, .22);
}

/* ── DARK (premium night) ── */
[data-theme="dark"] {
  --bg: #0B0B0F;
  --bg-soft: #14141B;
  --surface: #15151D;
  --surface-2: #1B1B24;
  --surface-glass: rgba(21, 21, 29, .76);
  --ink: #F5F5F0;
  --ink-2: #DCDCD6;
  --ink-muted: #9A9AA2;
  --ink-soft: #5A5A64;
  --line: rgba(255, 255, 250, .07);
  --line-2: rgba(255, 255, 250, .14);
  --accent: #F5F5F0;
  --accent-warm: #D4B47A;
  --accent-warm-soft: rgba(212, 180, 122, .14);
  --success: #6AD49A;
  --success-soft: rgba(106, 212, 154, .14);
  --danger: #FF7676;
  --danger-soft: rgba(255, 118, 118, .14);
  --warning: #F5C56A;
  --warning-soft: rgba(245, 197, 106, .14);
  --info: #7AB0E8;
  --info-soft: rgba(122, 176, 232, .14);
  --shadow-xs: 0 1px 2px rgba(0, 0, 0, .4);
  --shadow-sm: 0 1px 3px rgba(0, 0, 0, .5), 0 1px 2px rgba(0, 0, 0, .3);
  --shadow-md: 0 4px 14px rgba(0, 0, 0, .5), 0 1px 3px rgba(0, 0, 0, .3);
  --shadow-lg: 0 12px 40px rgba(0, 0, 0, .55), 0 2px 8px rgba(0, 0, 0, .35);
  --shadow-xl: 0 32px 80px rgba(0, 0, 0, .7), 0 8px 24px rgba(0, 0, 0, .5);
  --ring: 0 0 0 3px rgba(212, 180, 122, .26);
}

/* ── Base ── */
html { color-scheme: light dark; }
body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--ink);
  font-feature-settings: "cv11", "ss01", "ss03";
  letter-spacing: -0.005em;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
}

input, button, select, textarea {
  font-family: var(--font-sans);
}

/* ── Typography utility classes ── */
.mx-display {
  font-family: var(--font-serif);
  font-weight: 400;
  letter-spacing: -0.025em;
  line-height: 1.02;
  font-variation-settings: "opsz" 144, "SOFT" 30;
}
.mx-display-bold {
  font-family: var(--font-serif);
  font-weight: 600;
  letter-spacing: -0.028em;
  line-height: 1.02;
  font-variation-settings: "opsz" 144, "SOFT" 30;
}
.mx-num {
  font-family: var(--font-serif);
  font-weight: 500;
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.02em;
}
.mx-mono {
  font-family: var(--font-mono);
  font-feature-settings: "ss01";
}
.mx-label {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-muted);
}
.mx-eyebrow {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.22em;
  text-transform: uppercase;
}

/* ── Buttons ── */
button {
  font-family: var(--font-sans);
  letter-spacing: -0.005em;
  transition: background var(--d-mid) var(--ease-out),
              color var(--d-mid) var(--ease-out),
              border-color var(--d-mid) var(--ease-out),
              box-shadow var(--d-mid) var(--ease-out),
              transform var(--d-quick) var(--ease-out) !important;
}
button:active { transform: scale(0.97) !important; }
button:focus-visible { outline: none; box-shadow: var(--ring); }

/* Primary action button */
.mx-btn-primary {
  background: var(--accent);
  color: var(--bg);
  border-radius: var(--r-md);
  padding: 14px 22px;
  font-weight: 600;
  font-size: 15px;
  letter-spacing: -0.01em;
}
.mx-btn-primary:hover { background: var(--ink-2); }

.mx-btn-secondary {
  background: var(--surface);
  color: var(--ink);
  border: 1px solid var(--line-2);
  border-radius: var(--r-md);
  padding: 13px 20px;
  font-weight: 500;
  font-size: 14px;
}
.mx-btn-secondary:hover { background: var(--surface-2); border-color: var(--ink-muted); }

.mx-btn-ghost {
  background: transparent;
  color: var(--ink-muted);
  border-radius: var(--r-sm);
  padding: 10px 14px;
  font-weight: 500;
  font-size: 14px;
}
.mx-btn-ghost:hover { background: var(--surface-2); color: var(--ink); }

.mx-btn-warm {
  background: var(--accent-warm);
  color: #FFFFFF;
  border-radius: var(--r-md);
  padding: 14px 22px;
  font-weight: 600;
  font-size: 15px;
}
.mx-btn-warm:hover { filter: brightness(0.96); }

/* ── Chip ── */
.chip-modern {
  padding: 9px 16px !important;
  border-radius: var(--r-pill) !important;
  font-size: 13px !important;
  font-weight: 500 !important;
  letter-spacing: -0.005em !important;
  transition: all var(--d-mid) var(--ease-out) !important;
}

/* ── Inputs ── */
input, textarea, select {
  font-family: var(--font-sans) !important;
  border-radius: var(--r-md) !important;
  transition: border-color var(--d-mid) var(--ease-out),
              box-shadow var(--d-mid) var(--ease-out),
              background var(--d-mid) var(--ease-out) !important;
  font-feature-settings: "ss01";
}
input:focus, textarea:focus, select:focus {
  border-color: var(--accent-warm) !important;
  box-shadow: var(--ring) !important;
}
input::placeholder, textarea::placeholder { color: var(--ink-soft); }

/* ── Cards ── */
.card-v2 {
  background: var(--surface) !important;
  border: 1px solid var(--line) !important;
  border-radius: var(--r-lg) !important;
  box-shadow: var(--shadow-sm);
  transition: box-shadow var(--d-mid) var(--ease-out),
              border-color var(--d-mid) var(--ease-out),
              transform var(--d-mid) var(--ease-out);
}
.card-hover:hover {
  border-color: var(--line-2) !important;
  box-shadow: var(--shadow-md);
  transform: translateY(-1px);
}

/* ── Section label ── */
.label-v2 {
  font-family: var(--font-mono) !important;
  font-size: 10px !important;
  letter-spacing: 0.18em !important;
  font-weight: 500 !important;
  color: var(--ink-muted) !important;
  text-transform: uppercase;
}

/* ── Scrollbars ── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb {
  background: var(--line-2);
  border-radius: var(--r-pill);
  transition: background var(--d-mid);
}
::-webkit-scrollbar-thumb:hover { background: var(--ink-soft); }

/* ── Selection ── */
::selection { background: var(--accent-warm-soft); color: var(--ink); }

/* ── Animations ── */
@keyframes mxFadeIn { from { opacity: 0 } to { opacity: 1 } }
@keyframes mxSlideUp { from { transform: translateY(12px); opacity: 0 } to { transform: translateY(0); opacity: 1 } }
@keyframes mxSlideDown { from { transform: translateY(-8px); opacity: 0 } to { transform: translateY(0); opacity: 1 } }
@keyframes mxScaleIn { from { transform: scale(.96); opacity: 0 } to { transform: scale(1); opacity: 1 } }
@keyframes mxToastIn { from { transform: translate(-50%, 32px); opacity: 0 } to { transform: translate(-50%, 0); opacity: 1 } }
@keyframes mxToastOut { from { transform: translate(-50%, 0); opacity: 1 } to { transform: translate(-50%, 32px); opacity: 0 } }
@keyframes mxShimmer {
  0% { background-position: -200% center }
  100% { background-position: 200% center }
}
@keyframes mxPulseRing {
  0%, 100% { box-shadow: 0 0 0 0 rgba(184, 149, 106, .35) }
  50% { box-shadow: 0 0 0 10px rgba(184, 149, 106, 0) }
}
@keyframes btnShimmer {
  0% { background-position: -200% center }
  100% { background-position: 200% center }
}

.mx-anim-fade { animation: mxFadeIn var(--d-slow) var(--ease-out) both; }
.mx-anim-slide { animation: mxSlideUp var(--d-slow) var(--ease-out) both; }
.mx-anim-scale { animation: mxScaleIn var(--d-mid) var(--ease-out) both; }
.mx-stagger > * { animation: mxSlideUp 380ms var(--ease-out) both; }
.mx-stagger > *:nth-child(1) { animation-delay: 20ms }
.mx-stagger > *:nth-child(2) { animation-delay: 50ms }
.mx-stagger > *:nth-child(3) { animation-delay: 80ms }
.mx-stagger > *:nth-child(4) { animation-delay: 110ms }
.mx-stagger > *:nth-child(5) { animation-delay: 140ms }
.mx-stagger > *:nth-child(6) { animation-delay: 170ms }
.mx-stagger > *:nth-child(7) { animation-delay: 200ms }
.mx-stagger > *:nth-child(8) { animation-delay: 230ms }
.mx-stagger > *:nth-child(n+9) { animation-delay: 260ms }

/* ── Glass panel ── */
.mx-glass {
  background: var(--surface-glass);
  backdrop-filter: saturate(140%) blur(20px);
  -webkit-backdrop-filter: saturate(140%) blur(20px);
}

/* ── Icon button ── */
.mx-icon-btn {
  background: transparent;
  border-radius: var(--r-sm);
  transition: background var(--d-mid) var(--ease-out),
              color var(--d-mid) var(--ease-out),
              transform var(--d-quick) var(--ease-out);
}
.mx-icon-btn:hover { background: var(--surface-2); color: var(--ink); }
.mx-icon-btn:active { transform: scale(.94); }

/* ── PIN modal ── */
.pk-btn {
  font-family: var(--font-serif);
  font-weight: 500;
  transition: background var(--d-mid) var(--ease-out),
              transform var(--d-quick) var(--ease-out);
}
.pk-btn:hover { background: var(--accent-warm-soft); }
.pk-btn:active { transform: scale(.93); }

/* ── Toast ── */
.mx-toast {
  position: fixed;
  left: 50%;
  bottom: calc(24px + env(safe-area-inset-bottom));
  transform: translate(-50%, 0);
  background: var(--ink);
  color: var(--bg);
  padding: 12px 18px 12px 20px;
  border-radius: var(--r-pill);
  font-size: 14px;
  font-weight: 500;
  letter-spacing: -0.005em;
  display: inline-flex;
  align-items: center;
  gap: 14px;
  max-width: min(92vw, 480px);
  box-shadow: var(--shadow-xl);
  z-index: 11000;
  animation: mxToastIn 320ms var(--ease-spring) both;
  pointer-events: auto;
}
.mx-toast .mx-toast-undo {
  background: transparent;
  color: var(--accent-warm);
  border: none;
  font-weight: 600;
  font-size: 13px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  padding: 4px 6px;
  cursor: pointer;
  border-radius: var(--r-xs);
}
.mx-toast .mx-toast-undo:hover { background: rgba(255,255,255,.08); }
.mx-toast.mx-toast-leaving { animation: mxToastOut 220ms var(--ease-out) both; }

/* ── Status pill (Draft / Sent / Won / Lost) ── */
.mx-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px 4px 8px;
  border-radius: var(--r-pill);
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.14em;
  text-transform: uppercase;
}
.mx-pill::before {
  content: "";
  display: inline-block;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: currentColor;
}
.mx-pill-draft { background: var(--info-soft); color: var(--info); }
.mx-pill-sent { background: var(--warning-soft); color: var(--warning); }
.mx-pill-won { background: var(--success-soft); color: var(--success); }
.mx-pill-lost { background: var(--danger-soft); color: var(--danger); }

/* ── Hover only on capable devices ── */
@media (hover: none) {
  .card-hover:hover { transform: none; box-shadow: var(--shadow-sm); }
}

/* ── Reduced motion ── */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}

/* ── iPad responsive ── */
@media (min-width: 820px) {
  .mx-container { max-width: 1200px; margin: 0 auto; }
}
@media (min-width: 1024px) {
  body { font-size: 15px; }
}

/* ── Focus visible ── */
:focus { outline: none; }
:focus-visible { outline: none; box-shadow: var(--ring); border-radius: var(--r-sm); }

/* ── Print (PDFs) ── */
@media print {
  body { background: #FFFFFF !important; color: #0A0A0B !important; }
}
</style>

  #lv-license-gate .lv-spinner{display:inline-block;width:14px;height:14px;border:2px solid currentColor;border-right-color:transparent;border-radius:50%;animation:lv-spin .7s linear infinite;vertical-align:middle;margin-right:8px;}

<div id="lv-license-gate" role="dialog" aria-modal="true">
  <div class="lv-gate-card">
    <div class="lv-gate-logo">SCWP</div>
    <div class="lv-gate-subtitle">Maximus · Licensed Access</div>
    <div id="lv-gate-stage-validate" style="display:block;">
      <div class="lv-gate-msg"><span class="lv-spinner"></span>Verifying device...</div>
    </div>
    <div id="lv-gate-stage-enter" style="display:none;">
      <label class="lv-gate-label" for="lv-gate-key">License Key</label>
      <input id="lv-gate-key" type="text" autocomplete="off" autocapitalize="characters" spellcheck="false" placeholder="XXXX-XXXX-XXXX-XXXX" maxlength="32"/>
      <button id="lv-gate-activate-btn">Activate Device</button>
      <div id="lv-gate-msg" class="lv-gate-msg"></div>
    </div>
    <div id="lv-gate-stage-blocked" style="display:none;">
      <div class="lv-gate-msg error" id="lv-gate-blocked-msg">Access denied.</div>
      <button id="lv-gate-retry-btn" style="margin-top:24px;">Try Again</button>
    </div>
    <div class="lv-gate-footer">SoCal Windows Pro</div>
  </div>

<script id="lv-license-gate-script">
(function(){
  'use strict';
  // Hide the app until license is verified.
  var appEl = document.getElementById('app');
  if(appEl) appEl.style.display = 'none';

  var LV_API_BASE = '/.netlify/functions';
  var STORAGE_KEY = 'scwp_license_v1';
  var DEVICE_ID_KEY = 'scwp_device_id_v1';
  var DEV_OVERRIDE_KEY = 'scwp_dev_override_v1';

  var gate = document.getElementById('lv-license-gate');
  var stageValidate = document.getElementById('lv-gate-stage-validate');
  var stageEnter = document.getElementById('lv-gate-stage-enter');
  var stageBlocked = document.getElementById('lv-gate-stage-blocked');
  var keyInput = document.getElementById('lv-gate-key');
  var activateBtn = document.getElementById('lv-gate-activate-btn');
  var retryBtn = document.getElementById('lv-gate-retry-btn');
  var msgEl = document.getElementById('lv-gate-msg');
  var blockedMsg = document.getElementById('lv-gate-blocked-msg');

  function showStage(name){
    stageValidate.style.display = (name === 'validate') ? 'block' : 'none';
    stageEnter.style.display    = (name === 'enter')    ? 'block' : 'none';
    stageBlocked.style.display  = (name === 'blocked')  ? 'block' : 'none';
  }
  function setMsg(text, kind){
    msgEl.textContent = text || '';
    msgEl.className = 'lv-gate-msg' + (kind ? ' ' + kind : '');
  }
  function unlockApp(){
    gate.classList.add('hidden');
    if(appEl) appEl.style.display = '';
  }
  function lockOut(reason){
    blockedMsg.textContent = reason || 'Access denied.';
    showStage('blocked');
  }

  // Stable per-browser device ID (UUID v4-ish). Lost only if storage is cleared.
  function getDeviceId(){
    var id = null;
    try{ id = localStorage.getItem(DEVICE_ID_KEY); }catch(e){}
    if(!id){
      id = 'd-' + ([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g, function(c){
        return (c ^ (crypto.getRandomValues(new Uint8Array(1))[0] & 15) >> (c / 4)).toString(16);
      });
      try{ localStorage.setItem(DEVICE_ID_KEY, id); }catch(e){}
    }
    return id;
  }
  function getDeviceLabel(){
    var ua = navigator.userAgent || '';
    var platform = navigator.platform || 'Unknown';
    var browser = 'Browser';
    if(/Edg\//.test(ua)) browser = 'Edge';
    else if(/Chrome\//.test(ua) && !/Edg\//.test(ua)) browser = 'Chrome';
    else if(/Safari\//.test(ua) && !/Chrome\//.test(ua)) browser = 'Safari';
    else if(/Firefox\//.test(ua)) browser = 'Firefox';
    var os = 'Device';
    if(/iPad/.test(ua)) os = 'iPad';
    else if(/iPhone/.test(ua)) os = 'iPhone';
    else if(/Android/.test(ua)) os = 'Android';
    else if(/Mac/.test(platform)) os = 'Mac';
    else if(/Win/.test(platform)) os = 'Windows';
    else if(/Linux/.test(platform)) os = 'Linux';
    return os + ' · ' + browser;
  }

  function postJSON(path, body){
    return fetch(LV_API_BASE + path, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      cache: 'no-store',
      body: JSON.stringify(body || {})
    }).then(function(r){
      return r.json().then(function(data){ return { ok: r.ok, status: r.status, data: data }; });
    });
  }

  function saveLicense(key){
    try{ localStorage.setItem(STORAGE_KEY, key); }catch(e){}
  }
  function loadLicense(){
    try{ return localStorage.getItem(STORAGE_KEY); }catch(e){ return null; }
  }
  function clearLicense(){
    try{ localStorage.removeItem(STORAGE_KEY); }catch(e){}
  }

  // Validate existing license on every load.
  function validateExisting(){
    // Launched from Maximus CRM (…?crm=1): the rep is already authenticated in the CRM,
    // so skip the device license gate. Sticky for this TAB session only (the CRM params
    // get scrubbed from the URL right after boot), and NOT persisted to the device — so a
    // CRM hand-off never quietly licenses a machine.
    try{
      var _crmLaunch = new URLSearchParams(location.search).get('crm') === '1';
      if(_crmLaunch || sessionStorage.getItem('scwp_crm_session') === '1'){
        try{ sessionStorage.setItem('scwp_crm_session','1'); }catch(e){}
        unlockApp();
        return;
      }
    }catch(e){}
    // Manager dev-override: previously unlocked, skip server.
    try{
      if(localStorage.getItem(DEV_OVERRIDE_KEY) === '1'){
        unlockApp();
        return;
      }
    }catch(e){}
    var key = loadLicense();
    if(!key){
      showStage('enter');
      return;
    }
    showStage('validate');
    postJSON('/validate', { key: key, deviceId: getDeviceId() })
      .then(function(res){
        if(res.ok && res.data && res.data.valid){
          unlockApp();
        } else {
          clearLicense();
          var reason = (res.data && res.data.reason) || 'Device access has been revoked.';
          lockOut(reason);
        }
      })
      .catch(function(){
        lockOut('Cannot reach license server. Check your internet connection and try again.');
      });
  }

  // ── Manager-only hidden bypass ─────────────────────────────
  // 5-second press-and-hold on the "SCWP" logo prompts for the manager
  // password; only a correct password unlocks the app (server-bypass) and
  // persists the override for this device. Undocumented by design — no
  // visual affordance. Password is case-sensitive.
  //
  // The password is NOT stored in source — only its one-way SHA-256 hash is.
  // The typed input is hashed and compared to this digest, so the plaintext
  // password cannot be recovered by reading the code. (To change the password,
  // replace this hash with the SHA-256 of the new password.)

      });
    }catch(e){ return Promise.resolve(null); }
  }
  (function installDevOverride(){
    var logo = document.querySelector('#lv-license-gate .lv-gate-logo');
    if(!logo) return;
    var holdTimer = null;
    var startX = 0, startY = 0;
    var MOVE_TOLERANCE = 10; // px — finger drift cancels the long-press
    var HOLD_MS = 5000;
    // Commit the unlock once the password checks out: persist override + flash + open.
    function grantOverride(){
      try{ localStorage.setItem(DEV_OVERRIDE_KEY, '1'); }catch(_){}
      logo.style.transition = 'color .15s';
      logo.style.color = '#7BC97B';
      setTimeout(function(){ logo.style.color = ''; unlockApp(); }, 220);
    }
    // Minimal in-gate password prompt (styled like the gate; no app dependencies).
    function promptManagerPassword(){
      if(document.getElementById('lv-mgr-pw')) return;
      var ov = document.createElement('div');
      ov.id = 'lv-mgr-pw';
      ov.setAttribute('role','dialog'); ov.setAttribute('aria-modal','true');
      ov.style.cssText = 'position:fixed;inset:0;z-index:1000000;display:flex;align-items:center;justify-content:center;background:rgba(8,8,12,.78);padding:24px;';
      var card = document.createElement('div');
      card.style.cssText = 'max-width:360px;width:100%;text-align:center;background:#14141A;border:1px solid rgba(212,180,122,.35);border-radius:16px;padding:28px 24px;font-family:\'Outfit\',system-ui,sans-serif;color:#F5F5F0;box-shadow:0 24px 60px rgba(0,0,0,.5);';
      var lbl = document.createElement('div');
      lbl.textContent = 'Manager Password';
      lbl.style.cssText = 'font-size:10px;letter-spacing:.28em;font-weight:700;text-transform:uppercase;opacity:.6;margin-bottom:16px;';
      var inp = document.createElement('input');
      inp.type = 'password'; inp.autocomplete = 'off'; inp.spellcheck = false;
      inp.setAttribute('aria-label','Manager password');
      inp.style.cssText = 'width:100%;box-sizing:border-box;padding:15px 16px;border-radius:12px;background:rgba(255,255,255,.05);border:1.5px solid rgba(212,180,122,.3);color:#F5F5F0;font-size:16px;text-align:center;letter-spacing:.04em;font-family:\'DM Mono\',monospace;outline:none;';
      var msg = document.createElement('div');
      msg.style.cssText = 'min-height:16px;margin-top:12px;font-size:12px;color:#FF6B6B;';
      var go = document.createElement('button');
      go.textContent = 'Unlock';
      go.style.cssText = 'margin-top:16px;width:100%;padding:14px;border-radius:12px;background:linear-gradient(135deg,#D4B47A,#B8985E);color:#0B0B0F;font-weight:700;font-size:14px;letter-spacing:.04em;text-transform:uppercase;border:none;cursor:pointer;';
      function close(){ try{ ov.remove(); }catch(_){} }
      function fail(){ msg.textContent = 'Incorrect password.'; inp.value=''; inp.focus(); }
      var checking = false;
      function submit(){
        if(checking) return;
        var entered = inp.value;
        checking = true; go.disabled = true; msg.textContent = '';
        sha256Hex(entered).then(function(h){
          checking = false; go.disabled = false;
          if(h && h === DEV_BYPASS_PW_HASH){ close(); grantOverride(); }

      inp.addEventListener('keydown', function(e){ if(e.key === 'Enter'){ e.preventDefault(); submit(); } });

      ov.addEventListener('click', function(e){ if(e.target === ov) close(); });

      ov.appendChild(card); document.body.appendChild(ov);

    }
    function start(e){
      // ignore right-click / multi-touch / non-primary buttons

      startY = (e.clientY != null) ? e.clientY : 0;
      holdTimer = setTimeout(function(){
        // Long-press recognized → require the manager password before unlocking.
        promptManagerPassword();
      }, HOLD_MS);
    }
    function move(e){
      if(!holdTimer) return;
      var dx = (e.clientX || 0) - startX;
      var dy = (e.clientY || 0) - startY;
      if (dx*dx + dy*dy > MOVE_TOLERANCE*MOVE_TOLERANCE) cancel();
    }
    function cancel(){
      if(holdTimer){ clearTimeout(holdTimer); holdTimer = null; }
    }
    logo.style.userSelect = 'none';
    logo.style.webkitUserSelect = 'none';
    logo.style.cursor = 'default';
    // touchAction:none keeps the page from scrolling the logo out from under
    // the finger mid-press (which would silently leave the timer running).
    logo.style.touchAction = 'none';
    logo.addEventListener('pointerdown', start);
    logo.addEventListener('pointermove', move);
    logo.addEventListener('pointerup', cancel);
    logo.addEventListener('pointerleave', cancel);
    logo.addEventListener('pointercancel', cancel);
    // Safety: cancel if the page is hidden mid-press (tab switch, etc.)
    document.addEventListener('visibilitychange', function(){ if(document.hidden) cancel(); });
  })();

  function activate(){
    var key = (keyInput.value || '').trim().toUpperCase();
    if(key.length < 8){
      setMsg('Please enter your license key.', 'error');
      return;
    }
    activateBtn.disabled = true;
    setMsg('Activating...');
    postJSON('/activate', {
      key: key,
      deviceId: getDeviceId(),
      deviceLabel: getDeviceLabel()
    }).then(function(res){
      activateBtn.disabled = false;
      if(res.ok && res.data && res.data.success){
        saveLicense(key);
        setMsg('Activated. Loading app...', 'ok');
        setTimeout(unlockApp, 400);
      } else {
        var reason = (res.data && res.data.reason) || 'Activation failed.';
        setMsg(reason, 'error');
      }
    }).catch(function(){
      activateBtn.disabled = false;
      setMsg('Network error. Please try again.', 'error');
    });
  }

  activateBtn.addEventListener('click', activate);
  keyInput.addEventListener('keydown', function(e){ if(e.key === 'Enter') activate(); });
  retryBtn.addEventListener('click', function(){
    clearLicense();
    // Also clear the manager dev-override so a revoked device can't keep
    // re-entering via a prior unlock. Re-unlock requires the 5s long-press again.
    try{ localStorage.removeItem(DEV_OVERRIDE_KEY); }catch(_){}
    showStage('enter');
    keyInput.value = '';
    setMsg('');
  });

  // Boot.
  validateExisting();
})();

// words (e.g. "bay window"). Map recognized specialty shapes to their canonical
// diagram key so the preview/thumbnail renders the right graphic. Purely visual —
// the contract still prints the type exactly as the rep typed it.
function _canonType(t){
  if (typeof t !== 'string') return t;
  const s = t.trim().toLowerCase();
  // Recognize Bay/Bow from any reasonable entry — "Bay", "BAY", "Bay Window",
  // "baywindow", "bays", "3-lite bow", etc. — so the faceted preview shows
  // instead of a flat picture pane. A bare substring test is safe here: no
  // other operating-type code contains "bay"/"bow", and X/O signatures are
  // resolved before this runs. Purely visual — the contract prints as typed.
  if (s.includes('bay')) return 'Bay';
  if (s.includes('bow')) return 'Bow';
  return t;
}

// A bare X/O signature (e.g. "XX", "OX", "OXXO") is ambiguous: it can be a
// sliding WINDOW or a swinging DOOR. The Custom ("Other") form carries a
// Windows/Doors toggle (S.customKind) that the preview uses as a HINT to pick
// the right graphic. Purely visual — the contract still prints the type exactly
// as the rep typed it. Non X/O text falls through to _canonType().
function _mxpResolveType(raw, kind){
  if (typeof raw !== 'string') return _canonType(raw);
  const sig = raw.trim().toUpperCase().replace(/\s+/g,'');
  if (/^[XO]{2,}$/.test(sig)){
    // Only XX and OXXO swing (French doors). Everything else SLIDES —
    // XOX is always a window; XXO/OXX/OXO (and XO/OX) are patio-door sliders
    // when the Doors toggle is on. _mxpMarkup sizes the unit by `kind`.
    if (kind === 'door'){
      if (sig === 'XX')   return 'French Door XX';
      if (sig === 'OXXO') return 'French Door OXXO';
    }
    return sig;            // slider (window or patio door) — _mxpMarkup builds the panels
  }
  return _canonType(raw);
}

/* Inswing: swing toward the view so the doors stay fully visible (a true rotate-away recedes behind the
   frame and vanishes in this 3D preview). Opens a bit less than outswing (50°) — "not all the way out". */
@keyframes mxp-doorL-in{from{transform:rotateY(0)}to{transform:rotateY(-38deg)}}
@keyframes mxp-doorR-in{from{transform:rotateY(0)}to{transform:rotateY(38deg)}}

/* Hardware is HIDDEN on all preview graphics — delete the display:none below to bring it all back
   (sizes/locations are preserved: slider pull, hung-window cam-locks, casement/awning/bay lever,
   French-door handle-set). */
.mxp-hw{display:none!important;position:absolute;background:linear-gradient(180deg,#eef1f3,#b3b9bf 46%,#80868c);border-radius:1.5px;box-shadow:0 1px 2px rgba(0,0,0,.42),inset 0 1px 0 rgba(255,255,255,.75);z-index:5;}
.mxp-hw.camlock{width:6px;height:2.5px;left:50%;top:50%;transform:translate(-50%,-50%);}
.mxp-hw.lift{width:8px;height:2.5px;left:50%;bottom:6px;transform:translateX(-50%);}
/* Slider C-pull handle (nickel) — a vertical bar with curved top & bottom returns */
.mxp-hw.pull{width:2.5px;height:9px;border-radius:1.5px;background:linear-gradient(90deg,#fbfcfc,#cfd5d9 50%,#a2a8af);}
.mxp-hw.pull::before,.mxp-hw.pull::after{content:"";position:absolute;left:-0.75px;width:4px;height:2px;border-radius:1px;background:inherit;box-shadow:0 1px 1px rgba(0,0,0,.3);}
.mxp-hw.pull::before{top:-1px;} .mxp-hw.pull::after{bottom:-1px;}
/* Casement / awning / bay lever (brushed nickel) — small handle bar + a lever nub */
.mxp-hw.lever{width:2.5px;height:8px;border-radius:1.5px;background:linear-gradient(90deg,#f6f8f8,#c6ccd1 50%,#9298a0);}
.mxp-hw.lever::after{content:"";position:absolute;top:58%;left:50%;transform:translateX(-50%);width:5px;height:2px;border-radius:1px;background:linear-gradient(180deg,#eef1f3,#a7adb4);box-shadow:0 1px 1px rgba(0,0,0,.32);}
/* French-door lever handle SET — a WHITE painted escutcheon plate mounted ON the meeting stile, with a
   curved lever (upper third, protruding toward the meeting gap) and a thumb-turn lock near the bottom.
   Matches the real Anlin white French-door hardware; sits on the frame, never on the glass. */
.mxp-hw.dlever{width:5px;height:30px;border-radius:2px;
  background:linear-gradient(90deg,#ffffff,#f0f3f5 46%,#d4d9de);
  box-shadow:0 0 0 .5px rgba(120,134,150,.5),0 1px 2px rgba(0,0,0,.34),inset 0 1px 0 rgba(255,255,255,.95);}
.mxp-hw.dlever::before{content:"";position:absolute;left:50%;bottom:4px;transform:translateX(-50%);
  width:3px;height:3px;border-radius:50%;background:radial-gradient(circle at 38% 32%,#fff,#bcc2c8);
  box-shadow:0 .5px 1px rgba(0,0,0,.4);}
.mxp-hw.dlever::after{content:"";position:absolute;top:24%;width:8px;height:3.5px;
  background:linear-gradient(180deg,#ffffff,#e9ecef 48%,#cbd0d5);
  box-shadow:0 1px 1.5px rgba(0,0,0,.32),inset 0 1px 0 rgba(255,255,255,.95);}
.mxp-hw.dlever.lev-r::after{left:100%;margin-left:-3px;border-radius:1px 4px 5px 2px;}
.mxp-hw.dlever.lev-l::after{right:100%;margin-right:-3px;border-radius:4px 1px 2px 5px;}
/* The handle overlay is anchored to the meeting line, not the swinging panel, so fade it out while
   the doors swing — keeps a clean open view instead of a handle floating over the gap. */
.mxp-animate .mxp-hw.dlever,.mxp-animate .mxp-hw.camlock{opacity:0;transition:opacity .28s ease;}
/* French (swing) doors: heavy stiles + a noticeably fatter bottom rail, matched to real Anlin door
   proportions; plus a chamfered glazing bead (bright bead face + fine shadow line) where the glass
   meets the frame, with the glass sitting slightly recessed behind the frame face. */
.mxp-unit.french .mxp-sash{border-width:10px 11px 17px 11px;
  box-shadow:
    inset 0 0 0 1.5px var(--mxp-beadHi),              /* lit bevel bead hugging the frame's inner edge (frame-tinted) */
    inset 0 0 0 3px var(--mxp-beadLo),                /* fine chamfer shadow line where the bead meets glass */
    inset 0 2.5px 5px rgba(14,38,60,.32),             /* glass recessed behind the frame face (top shadow)   */
    inset 0 1px 0 rgba(255,255,255,.7),
    inset 0 -14px 20px rgba(14,38,60,.36),
    0 2px 6px rgba(0,0,0,.26);}
/* Sliding patio / slider doors (door-mode, non-French): a moderate frame with a fatter bottom rail and
   the same chamfered glazing bead as the French doors, but scaled to the slimmer slider sightlines. */
.mxp-unit.door:not(.french) .mxp-sash,
.mxp-unit.doorwide:not(.french) .mxp-sash{border-width:6px 6px 8px 6px;
  box-shadow:
    inset 0 0 0 1.25px var(--mxp-beadHi),         /* lit white bevel bead at the frame's inner edge */
    inset 0 0 0 2.5px var(--mxp-beadLo),          /* fine chamfer shadow line where bead meets glass */
    inset 0 2px 4px rgba(14,38,60,.30),               /* glass recessed behind the frame face            */
    inset 0 1px 0 rgba(255,255,255,.7),

    inset 0 0 0 1.25px var(--mxp-beadHi),

/* Trapezoid = TWO VERTICAL sides (one tall, one short) + flat bottom + SLOPED TOP.
   Base (no flip) = Leg Side Left  → tall side RIGHT, short side LEFT (top slopes up-right).

function _mxpColorClass(color){
  switch(color){
    case 'Tan': return 'mxp-tan';
    case 'Adobe':
    case 'Earth Tones': return 'mxp-adobe';
    case 'Black/White': return 'mxp-blackwhite';
    case 'Black/Black': return 'mxp-black';
    case 'Custom Color': return 'mxp-custom';
    default: return '';
  }
}

// Per-render glass decoration derived from the adder list.
function _mxpGlass(adders){
  adders = adders || [];
  const sashCls = adders.includes('obscure') ? ' obscure' : '';
  let overlay = '';
  if (adders.includes('sculptgrid')) overlay = '<span class="mxp-gl sculpt"></span>';
  else if (adders.includes('flatgrid')) overlay = '<span class="mxp-gl"></span>';
  const temp = adders.includes('tempered') ? '<span class="mxp-temp">TEMP</span>' : '';
  return { sashCls, overlay, temp };
}

// X = operating panel, O = fixed. Each X slides toward its NEAREST O.
function _mxpSlideDirs(panels){
  const n=panels.length, mid=(n-1)/2;
  return panels.map((ch,i)=>{
    if(ch!=='X') return '';
    let dl=Infinity,dr=Infinity;
    for(let j=i-1;j>=0;j--){ if(panels[j]==='O'){dl=i-j;break;} }
    for(let j=i+1;j<n;j++){ if(panels[j]==='O'){dr=j-i;break;} }
    if(dl<dr) return 'L';
    if(dr<dl) return 'R';
    return i<mid ? 'R' : 'L';
  });
}
function _mxpBuildPanels(cfg, gl){
  const raw=String(cfg||'');
  // Optional direction marker on the config (e.g. "OXO▶"/"OXO◀") forces which way an AMBIGUOUS
  // middle panel slides — equidistant to a fixed O on both sides — so OXO can open either way.
  const forceDir = /[▶>]/.test(raw)?'R' : /[◀<]/.test(raw)?'L' : null;
  const panels=raw.toUpperCase().replace(/[^XO]/g,'').split('');
  const n=panels.length, w=100/n, dirs=_mxpSlideDirs(panels);
  if(forceDir){ for(let i=0;i<n;i++){ if(panels[i]==='X'){ let dl=Infinity,dr=Infinity;
    for(let j=i-1;j>=0;j--){ if(panels[j]==='O'){dl=i-j;break;} }
    for(let j=i+1;j<n;j++){ if(panels[j]==='O'){dr=j-i;break;} }
    if(dl===dr) dirs[i]=forceDir; } } }
  const handle=new Array(n).fill(false);
  const slot  =new Array(n).fill(0);
  for(let i=0;i<n;){
    if(panels[i]!=='X'){ i++; continue; }
    let j=i; while(j+1<n && panels[j+1]==='X' && dirs[j+1]===dirs[i]) j++;
    const d=dirs[i];
    for(let k=i;k<=j;k++) slot[k] = d==='L' ? (k-i) : (j-k);
    handle[ d==='L' ? j : i ] = true;
    i=j+1;
  }
  const target=(i,dir)=>{
    if(dir==='L'){ for(let j=i-1;j>=0;j--) if(panels[j]==='O') return j; return 0; }
    if(dir==='R'){ for(let j=i+1;j<n;j++) if(panels[j]==='O') return j; return n-1; }
    return i;
  };
  return panels.map((ch,i)=>{
    const isX=ch==='X', left=(i*w).toFixed(4);
    // Slide travel (% of own width). Normally an operable X slides a full panel to stack over its
    // target O. BUT when an opposing X targets the SAME O (e.g. XOX end-vent slider), the two converge
    // and must STOP once they MEET at the O's center — so each travels half, ending edge-to-edge.
    const tx = isX ? (()=>{ const di=dirs[i], t=target(i,di), full=t-i;
        let converge=false; for(let j=0;j<n;j++){ if(j!==i && panels[j]==='X' && dirs[j]!==di && target(j,dirs[j])===t){ converge=true; break; } }
        return (converge ? full - Math.sign(full)*0.5 : full)*100; })() : 0;
    const anim = isX ? ' a-pan' : '';
    const z = isX ? 2+slot[i] : 1;
    // Lock/pull sits on the MEETING stile — the side the operable panel slides toward (where it
    // overlaps the adjacent panel), at center height. (dir='L' → meets on the left; 'R' → on the right.)
    const hw = handle[i] ? `<span class="mxp-hw pull" style="${dirs[i]==='L'?'left':'right'}:5px;top:50%;transform:translateY(-50%)"></span>` : '';
    return `<div class="mxp-sash mxp-panelw${anim}${gl.sashCls}" style="left:${left}%;width:${w}%;z-index:${z};--mxp-tx:${tx}%">${gl.overlay}${hw}</div>`;
  }).join('');
}

// Build the in-stage markup for one type. Returns an HTML string (closed/open
// share markup; the .mxp-animate root class drives motion). Unknown types fall
// back to a fixed picture pane.
function _mxpMarkup(type, gl, kind, sz, trapSide, slide){
  const isDoor = kind === 'door';
  const sash = (cls, extra) => `<div class="mxp-sash ${cls}${gl.sashCls}"${extra?(' '+extra):''}>${gl.overlay}</div>`;
  // sz: optional "width:Npx;height:Npx;" from proportional sizing (typePreview). Applied to the
  // outer .mxp-unit box for rectangular operating types; skipped for true-geometry shapes
  // (circle/trap/arch) so a round/triangular unit keeps its real proportions.
  const _szOK = (cls) => sz && !/\bcircle\b|\btrap\b|\barch\b/.test(cls);
  const unit = (cls, inner, clip) =>
    `<div class="mxp-unit ${cls}"${_szOK(cls)?` style="${sz}"`:''}><div class="mxp-inner${clip?' clip':''}${/\barch\b/.test(cls)?' arch':''}${/\bcircle\b/.test(cls)?' circle':''}${/\btrap\b/.test(cls)?' trap':''}">${inner}</div>${gl.temp}</div>`;
  const lever = (side) => `<span class="mxp-hw lever" style="${side}:5px;top:50%;transform:translateY(-50%)"></span>`;
  // French-door lever handle SET: a white escutcheon plate mounted ON the meeting stile. It is placed
  // as an OVERLAY on the (un-clipped) inner — NOT inside a sash — because the sash clips at the glass
  // edge (overflow:hidden) and would force the handle onto the glass. `leftPct` puts the plate over the
  // stile; `dir` (lev-r/lev-l) points the lever toward the meeting gap. translateZ lifts it to the face;
  // it fades out while the doors swing (see .mxp-animate rule) so nothing floats in the open view.
  const dh = (leftPct, dir) => `<span class="mxp-hw dlever ${dir}" style="left:${leftPct}%;top:50%;transform:translate(-50%,-50%) translateZ(2px)"></span>`;
  const lift  = '<span class="mxp-hw lift"></span>';
  // Pull-Tight Cam Locks (Anlin's standard window lock) — Single/Double-Hung carry TWO on the check
  // rail, symmetric about center and slightly canted, like the real unit.
  const camlock = (l,rot) => `<span class="mxp-hw camlock" style="left:${l}%;top:50%;transform:translate(-50%,-50%) rotate(${rot}deg) translateZ(2px)"></span>`;
  // X/O slider sizing. XOX is always a window. In Doors mode, 2-panel codes get
  // a door-height unit; 3+-panel codes (XXO/OXX/OXO) get a wide door unit.
  const slider = (code) => unit(
    code === 'XOX' ? 'wide' : isDoor ? (code.length > 2 ? 'doorwide' : 'door') : 'wide',
    _mxpBuildPanels(code, gl), true);

  switch(type){
    case 'PW':
      return unit('', sash('mxp-full'), false);
    case 'SH':
      return unit('tall', sash('mxp-half top') + `<div class="mxp-sash mxp-half bottom a-slideUp${gl.sashCls}">${gl.overlay}</div>` + camlock(41,-13) + camlock(59,13), true);
    case 'DH':
      return unit('tall', `<div class="mxp-sash mxp-half top a-dhTop${gl.sashCls}">${gl.overlay}</div>` + `<div class="mxp-sash mxp-half bottom a-dhBot${gl.sashCls}">${gl.overlay}</div>` + camlock(41,-13) + camlock(59,13), true);
    case 'XO': case 'OX': case 'XX': case 'XOX': return slider(type);
    case 'CSMT':
      return unit('tall', `<div class="mxp-sash mxp-full a-swingL${gl.sashCls}">${gl.overlay}${lever('right')}</div>`, false);
    case 'AWN':
      return unit('', `<div class="mxp-sash mxp-full a-swingT${gl.sashCls}">${gl.overlay}${lift}</div>`, false);
    case '2-Panel Patio':
      // Handing follows the XO/OX choice: XO = operable panel left, OX = operable panel right.

// Core renderer. Returns an HTML string, or null when an OPEN view is asked

function typePreview(type, opts){

  if (open && !_MXP_OPEN.has(t) && !/^[XO]{2,}$/.test(t)) return null;
  const animate = open;                       // open state plays the operation loop
  const scale = opts.scale || 1;
  const colCls = _mxpColorClass(opts.color);
  const gl = _mxpGlass(opts.adders);
  // Proportional sizing — size the preview box to the entered Width:Height ratio
  // (gently clamped) so it reads tall/wide like the real unit. Fixed-geometry shapes
  // (circle, trapezoid, half-round, bay/bow) keep their true shape and are skipped.
  let _sz='';

    const MAXW=232, MAXH=176; let bw=MAXW, bh=bw/r;
    if(bh>MAXH){ bh=MAXH; bw=bh*r; }

    } else if(k==="radiusgrid"){
      amt = (px[k]!==undefined)?Math.max(0,parseFloat(px[k])||0):113;  // Radius geometric grid (Sunburst/Sunstar/Custom) — flat $113, flat-grid geometrics
    } else if(k==="obscurepat"){

    } else {

      // NOTE: Green House Infinit-e3 lands here on purpose — it's a Tru-Frame product, NOT part of the Anlin
      // free-e3 promo, so it ALWAYS charges the GH table price (with the normal Custom-$ override available).
      amt = (px[k]!==undefined)?Math.max(0,parseFloat(px[k])||0):gAdder(k,ui,ser);

// Keep only custom-price entries whose adder is still selected (so deselecting an

function _cleanAdderPx(px, adders){

function calcPrice(ser,type,fr,w,h,adders,color,doorW,customPrice,e3opt,px){
  const rawUI=parseInt(w)+parseInt(h);if(!rawUI||rawUI<1)return{err:"Enter width & height"};
  const isSL=type==="Side Lite Pair"||type==="Side Lite Single",dw=parseInt(doorW)||0;
  const ui=isSL&&dw>0?parseInt(w)+dw+parseInt(h):rawUI;
  let eff=[...adders];
  // Tempered / Fire Code / ½ Tempered are mutually exclusive (priority: full Tempered > Fire Code > ½-Temp).
  if(eff.includes("tempered"))eff=eff.filter(k=>k!=="halftemp"&&k!=="firecode");
  else if(eff.includes("firecode"))eff=eff.filter(k=>k!=="halftemp");
  const range=getUIRange(ser,type,fr);let warn=null;
  if(range){if(ui<range[0])warn="Below sizing min — priced at lowest tier. Verify with rep.";else if(ui>range[1])warn="Above sizing max — if no table price, enter a custom price below. Verify with rep.";}
  // Custom price override: bypasses the table lookup when no rate exists or rep wants a manual override.
  const cp=parseFloat(customPrice);
  const usedCustom=!isNaN(cp)&&cp>0;
  let base;
  if(usedCustom){base=cp;warn=null;}
  else{
    base=basePrice(ser,type,fr,ui);
    if(base===null){
      const tip=range&&ui>range[1]?" (max UI "+range[1]+")":range&&ui<range[0]?" (min UI "+range[0]+")":"";
      return{err:"No price for UI="+ui+tip+". Enter a custom price below."};
    }
    // Over-84" frame-height upcharge — swing doors + side-lites, added to base by panel count (price book MAL p.12).
    if(ser==="Malibu Door"&&_DOOR_SWING_TYPES.has(type)&&(parseInt(h)||0)>84) base+=_doorOverHeight(type);
  }
  // Glaze total comes from the shared glazeLines() so the on-screen breakdown,
  // Estimate PDF, and this total can never disagree. (Tempered folds in full e3;
  // standalone e3 honors the per-item $0/Anlin toggle via e3opt.)
  let gTotal=glazeLines(adders,ui,e3opt,px,ser).reduce((s,l)=>s+l.amount,0);
  // Surface upgrades that have no price entry (e.g. a renamed/removed key) instead of silently charging $0.
  // "other" is a deliberately-unpriced custom adder (priced via the custom-price field), so exclude it.
  const _unknownAdders=eff.filter(k=>k!=="halftemp"&&k!=="firecode"&&k!=="other"&&k!=="shelfTemp"&&k!=="shelfMesh"&&k!=="fg1233"&&k!=="diamondgrid"&&k!=="customgrid"&&k!=="radiusgrid"&&k!=="obscurepat"&&GC[k]===undefined);
  if(_unknownAdders.length){const _m="Upgrade not priced ($0): "+_unknownAdders.join(", ")+" — verify price book.";warn=warn?warn+" · "+_m:_m;}
  // Same protection for an IN-table glaze key whose UI is past the table's last row: gAdder falls through
  // to $0 (e.g. Green House above 132 UI). Surface it exactly like _unknownAdders ($0 + warning) so an
  // oversized unit can't silently undercharge its glass upgrades. (Does not change any in-range amount.)
  const _gtMax=_gAdderTableMax(ser);
  const _oorGlaze=(_gtMax!=null)?eff.filter(k=>GC[k]!==undefined&&ui>_gtMax):[];
  if(_oorGlaze.length){const _m="Glass upgrade above sizing max ($0): "+_oorGlaze.join(", ")+" (UI "+ui+" > "+_gtMax+") — verify price book / enter a custom price.";warn=warn?warn+" · "+_m:_m;}
  // Color surcharges are ANLIN factory upcharges (% of base). They do NOT apply to the
  // "Other"/Custom series — the rep types that unit's full price themselves, so any color
  // cost is already baked into their custom price. Zero it out for Custom.
  const cAdd=(ser==="Custom")?0:Math.round(base*(
    // Green House offers only White/Tan — never honor a Black/Custom laminate surcharge (guards imported/legacy data)
    (ser==="Green House"&&color!=="White"&&color!=="Tan")?0:
    color==="Black/White"?0.70:
    color==="Black/Black"?1.00:
    // "Earth Tones" is the color-picker label; "Adobe" is the legacy/Anlin name for
    // the same finish. Both must get the 4% upcharge (was a silent 0% miss when the
    // picker stored "Earth Tones" but only "Adobe" was matched here).
    (color==="Tan"||color==="Adobe"||color==="Earth Tones")?0.04:
    0));
  const sub=base+gTotal+cAdd;
  return{base,adderTotal:gTotal+cAdd,glazeTotal:gTotal,colorAdder:cAdd,subtotal:sub,brk:"UI "+ui,effectiveAdders:eff,sizeWarning:warn,customPriceUsed:usedCustom,err:null};
}

// ══════════════════════════════════════════════════════════════════════
// EGRESS — CRC R310 / IRC R310 emergency-escape compliance check
// Code: ≥5.7 sq ft NCO, ≥20"W, ≥24"H, sill ≤44" AFF, operable from inside.
// We can't measure sill from the app; we check size + operable type.
// Replacement-window exception (CRC R310.2): exempt if equal-or-larger
// clear opening than the existing window and rough opening unchanged.
// ══════════════════════════════════════════════════════════════════════
const EGRESS_MIN_AREA_SQIN = 5.7 * 144;   // 820.8
const EGRESS_MIN_W = 20;
const EGRESS_MIN_H = 24;
// Auto-detect sleeping room from common label terms. Reps override per item.
function isLikelyBedroom(label){
  // Word-bounded matches to avoid false positives like "Bedding Storage" or "Bedrock".
  // Allows "Bedroom", "Bed Room", "Bedrooms", "Bdrm", "Nursery", "Guest Room", "Sleeping ...".
  return /\b(bed\s*rooms?|bdrm|nursery|sleeping|guest\s*r(?:oo)?m|sleep\s*r(?:oo)?m)\b/i.test(String(label||''));
}
// Approximate net clear opening from window dimensions and operating type.
// Formulas based on industry-standard vinyl-window frame allowances; ≥0.5" of
// the manufacturer's true spec. Custom-price items / unknown types return null.
function clearOpening(type, w, h){
  const W=parseInt(w)||0, H=parseInt(h)||0;
  if(!W||!H)return null;
  const t=type||'';
  let cw=0, ch=0, operable=true;
  switch(t){
    case 'SH': case 'DH':                                  // single/double hung — one sash slides up
      cw=W-5; ch=(H/2)-4.375; break;
    case 'XO': case 'OX': case 'XX':                       // sliders — one panel
      cw=(W/2)-3; ch=H-3.5; break;
    case 'XOX':                                            // triple slider — outer panel
      cw=(W/3)-3; ch=H-3.5; break;
    case 'CSMT':                                           // casement — near-full sash when open 90°
      cw=W-3; ch=H-3; break;
    case 'AWN':                                            // awning — short, usually fails 24"H
      cw=W-3; ch=H-3; break;
    case 'PW': case 'Casement PW': case 'GEO Cat.1': case 'GEO Cat.2': case 'GEO Cat.3':
      operable=false; break;                               // fixed — never qualifies
    // Doors are large enough to egress by themselves; treat the door panel as the clear opening.
    case '2-Panel Patio': case 'French Door XX': case 'French Door OXXO':
    case 'Side Lite Single': case 'Side Lite Pair':
      cw=Math.max(0,(W/2)-3); ch=H-3; break;
    default: return null;
  }
  cw=Math.max(0,cw); ch=Math.max(0,ch);
  return {w:cw, h:ch, sqIn:cw*ch, sqFt:(cw*ch)/144, operable};
}
// Main egress evaluator. Returns {code, label, detail, clear, citation, canException}.
// code: 'na' | 'ok' | 'warn' | 'fail'
function egressStatus(item){
  if(!item)return {code:'na'};
  // Mulled / combination units have no single clear opening — egress is judged on the individual operable lite.
  if(item.type==='Combination')return {code:'na',label:'Egress evaluated per lite'};
  const isBedroom=item.roomType==='bedroom'||(item.roomType==null&&isLikelyBedroom(item.label));
  if(!isBedroom)return {code:'na',label:'Egress not required',detail:'Non-sleeping room'};
  const co=clearOpening(item.type, item.width, item.height);
  if(!co){
    return {code:'warn',label:'Egress cannot be verified',detail:'Custom or unsupported type — confirm clear opening manually.',citation:'CRC R310.2.1'};
  }
  // Fixed / not operable → never qualifies (unless replacement exception)
  if(!co.operable){
    if(item.egressOverride){
      return {code:'warn',label:'Fixed window — replacement exception confirmed',detail:'Customer acknowledged the prior window was also fixed.',clear:co,citation:'CRC R310.2'};
    }
    return {code:'fail',label:'Fixed window — not operable',detail:'Cannot serve egress in a sleeping room. Replacement exception still applies if the prior unit was also fixed.',clear:co,citation:'CRC R310.1'};
  }
  const reasons=[];
  if(co.sqIn < EGRESS_MIN_AREA_SQIN) reasons.push('area '+co.sqFt.toFixed(2)+' sq ft (need 5.7)');
  if(co.w < EGRESS_MIN_W) reasons.push('width '+co.w.toFixed(1)+'" (need 20)');
  if(co.h < EGRESS_MIN_H) reasons.push('height '+co.h.toFixed(1)+'" (need 24)');
  if(reasons.length===0){
    return {code:'ok',label:'Egress OK',detail:co.w.toFixed(1)+'" × '+co.h.toFixed(1)+'" · '+co.sqFt.toFixed(2)+' sq ft',clear:co,citation:'CRC R310 · meets all minimums'};
  }
  if(item.egressOverride){
    return {code:'warn',label:'Below egress — replacement exception confirmed',detail:co.w.toFixed(1)+'" × '+co.h.toFixed(1)+'" · '+co.sqFt.toFixed(2)+' sq ft. Equal-or-larger than existing confirmed.',clear:co,citation:'CRC R310.2 · replacement exception'};
  }
  return {code:'warn',label:'Below egress minimum',detail:co.w.toFixed(1)+'" × '+co.h.toFixed(1)+'" · '+co.sqFt.toFixed(2)+' sq ft (need ≥5.7). Replacement exception may apply if the new clear opening is equal-or-larger than existing.',clear:co,citation:'CRC R310.2 · replacement exception'};
}

// ── Fire Hazard Severity Zone lookup (CA Chapter 7A / WUI tempered-glazing trigger). ──
// Best-effort + online-only: geocodes the customer address and checks CAL FIRE's FHSZ layer
// through a same-origin Netlify proxy (/.netlify/functions/firezone). ANY failure leaves the
// manual toggle in charge. Advisory only — never a legal compliance determination.
// Apply a state update + render WITHOUT stealing focus from a Customer-Info field the user is typing in.
// Fire-zone results arrive async and would otherwise yank focus mid-entry (e.g. tabbing out of Zip).
function _updKeepFocus(patch){
  const a=document.activeElement;
  const ph=(a&&a.tagName==="INPUT"&&a.closest&&a.closest("#app"))?a.placeholder:null;
  const cs=ph?a.selectionStart:null, ce=ph?a.selectionEnd:null;
  upd(patch);
  if(ph){ try{ const tw=[...document.querySelectorAll("#app input")].find(x=>x.placeholder===ph); if(tw){ tw.focus(); if(cs!=null) tw.setSelectionRange(cs,ce); } }catch(_){} }
}
async function checkFireZone(force){
  try{
    if(typeof navigator!=="undefined" && navigator.onLine===false) return;
    if(!S.custAddress || !((S.custCity&&S.custCity.trim())||(S.custZip&&S.custZip.trim()))) return;
    const addr=[S.custAddress,S.custCity,(S.custState||"CA"),S.custZip].map(x=>(x||"").trim()).filter(Boolean).join(", ");
    if(!force && S.fireZoneAddr===addr) return;   // already checked this exact address
    if(S.fireZoneChecking) return;
    upd({fireZoneChecking:true},true);   // noRender: don't rebuild the card on blur/Tab — it was destroying the field focus was moving into (e.g. Zip → Source)
    let d=null;
    try{
      const ctrl=new AbortController(); const tm=setTimeout(()=>{try{ctrl.abort();}catch(_){}},12000);
      // Send structured parts so the function can do a parcel-by-address lookup (rooftop-accurate, no geocoder).
      const qs=new URLSearchParams({addr:S.custAddress||"",city:S.custCity||"",state:S.custState||"CA",zip:S.custZip||""});
      const r=await fetch("/.netlify/functions/firezone?"+qs.toString(),{signal:ctrl.signal,headers:{Accept:"application/json"}});
      clearTimeout(tm);
      if(r&&r.ok) d=await r.json();
    }catch(_){ d=null; }
    if(d && d.ok){
      // Commit the address only on success, so a transient failure retries next time.
      _updKeepFocus({fireTemper:!!d.temper, fireZoneLabel:d.label||"", fireZoneSource:"auto", fireZoneAddr:addr, fireZoneChecking:false});
    } else {
      _updKeepFocus({fireZoneChecking:false});   // couldn't determine — retry on the next address change
    }
  }catch(_){ try{_updKeepFocus({fireZoneChecking:false});}catch(__){} }
}
// ── ZIP → City/State autofill (online; same-origin Netlify proxy). Fills the City field only if it's
// empty (never clobbers a typed city) and sets State from the ZIP. Silent no-op offline / on any failure. ──
async function lookupZipCity(zip, cityInp, stateInp){
  try{
    if(typeof navigator!=="undefined" && navigator.onLine===false) return;
    zip=String(zip||"").trim();
    if(!/^\d{5}$/.test(zip)) return;
    const ctrl=new AbortController(); const tm=setTimeout(()=>{try{ctrl.abort();}catch(_){}},7000);
    const r=await fetch("/.netlify/functions/zipcity?zip="+encodeURIComponent(zip),{signal:ctrl.signal,headers:{Accept:"application/json"}});
    clearTimeout(tm);
    if(!r||!r.ok) return;
    const d=await r.json();
    if(d && d.ok){
      if(d.city && cityInp && !((cityInp.value||"").trim())){ cityInp.value=d.city; S.custCity=d.city; }
      if(d.state && stateInp){ stateInp.value=d.state; S.custState=d.state; }
      try{ _prefetchProperty(); }catch(_){}   // address is now complete (ZIP+city) → warm the Property Info cache in the background
    }
  }catch(_){}
}
// ── Property Info (Redfin) — looks up the customer address via the same-origin Netlify proxy.
// View-only (never saved on the quote); cached per-address for the session so reopening is instant.
// Online-only; graceful fallback messages on any failure (unofficial Redfin endpoint = best-effort). ──
async function fetchPropertyInfo(force, quiet){
  // quiet = a BACKGROUND pre-fetch kicked off from the home screen as the address is typed,
  // so opening the Property Info screen is instant (no spinner). In quiet mode the initial
  // loading flag is set WITHOUT a render (rebuilding the Customer-Info card mid-blur/Tab would
  // steal focus — same trap checkFireZone avoids). The RESULT still renders if the user has
  // since opened the property screen, so a lookup that finishes after they tap shows up live.
  const _start=(o)=>upd(o, quiet?true:false);
  const _done =(o)=>upd(o, S.screen!=="propertyInfo");   // render only when the property screen is showing
  try{
    const addr=[S.custAddress,S.custCity,(S.custState||"CA"),S.custZip].map(x=>(x||"").trim()).filter(Boolean).join(", ");
    if(!S.custAddress || !S.custAddress.trim() || !addr){ if(!quiet) _done({propLoading:false,propInfo:null,propError:"Enter the customer's address first.",propAddr:""}); return; }
    if(!force && S.propAddr===addr && (S.propInfo||S.propError)) return;   // already looked up this exact address
    if(!force && S.propLoading && S.propAddr===addr) return;               // a lookup for this exact address is already in flight
    if(typeof navigator!=="undefined" && navigator.onLine===false){ if(!quiet) _done({propLoading:false,propInfo:null,propError:"You're offline — reconnect to look up property info.",propAddr:addr}); return; }
    _start({propLoading:true,propError:null,propAddr:addr});
    let d=null;
    try{
      const ctrl=new AbortController(); const tm=setTimeout(()=>{try{ctrl.abort();}catch(_){}},15000);
      const qs=new URLSearchParams({addr:S.custAddress||"",city:S.custCity||"",state:S.custState||"CA",zip:S.custZip||""});
      const r=await fetch("/.netlify/functions/property?"+qs.toString(),{signal:ctrl.signal,headers:{Accept:"application/json"}});
      clearTimeout(tm);
      if(r&&r.ok) d=await r.json();
    }catch(_){ d=null; }
    if(d && d.ok){ _done({propInfo:d,propError:null,propLoading:false,propAddr:addr}); }
    else { _done({propInfo:null,propError:(d&&d.reason)||"Couldn't find this property on Redfin.",propLoading:false,propAddr:addr}); }
  }catch(_){ try{ _done({propLoading:false,propError:"Lookup failed — try again."}); }catch(__){} }
}
// Background pre-fetch from the home Customer-Info card: only once the address is complete enough

// Is this a window we'd ever temper for a fire zone? (Doors come tempered standard; Custom has no adder model.)
function _fireTemperable(it){ return it && it.series!=="Malibu Door" && it.series!=="Custom"; }

// Per-unit commission surcharge (matches the Profit Check sheet): $5 per window unit + $10 per door unit,

const SURCHARGE_WIN=5, SURCHARGE_DOOR=10;
function _commSurchargeDoor(it){ return _isDoorItem(it) || (!!it && it.series==="Custom" && it.customKind==="door"); }
function _commSurcharge(items){

function jobLaborTier(items){
  const q=jobWindowQty(items);
  const _n=(v,d)=>{const x=parseFloat(v);return Number.isFinite(x)&&x>=0?x:d;};   // admin-editable rates; fall back to factory defaults
  return q>=10?_n(S.laborT10,145):q>=7?_n(S.laborT7,185):q>=4?_n(S.laborT4,285):_n(S.laborTbase,400);
}
// Update auto-labor items to the current job tier. Mutates the items array members.
function recomputeAutoLabor(items){
  const rate=jobLaborTier(items);
  return items.map(it=>{
    if(_isDoorItem(it))return it;
    if(it.laborAuto===false)return it;
    return {...it,labor:rate};
  });
}

// Phone formatter: strips non-digits and formats up to 10 digits as (xxx) xxx-xxxx.
// Idempotent — safe to run on already-formatted input.
function formatPhone(raw){
  const d=String(raw||'').replace(/\D/g,'').slice(0,10);
  if(d.length===0)return '';
  if(d.length<4)return '('+d;
  if(d.length<7)return '('+d.slice(0,3)+') '+d.slice(3);
  return '('+d.slice(0,3)+') '+d.slice(3,6)+'-'+d.slice(6);
}

// ── Multi-discount helpers ──
// All discounts apply additively to the discount base (pre-tax sale = materials + labor).
// % discounts are computed against `base`; $ discounts are flat. Legacy single-discount fields supported.
// One-time migration: fold a legacy single-discount (discountPct/Dollar/Label/Mode) into S.discounts[],
// then wipe the legacy fields so it never re-migrates. Shared by the Discount modal + the Customer-View card.
function migrateDiscounts(){
  if(!Array.isArray(S.discounts))S.discounts=[];
  if(S.discounts.length===0 && (S.discountPct||S.discountDollar)){
    S.discounts=[{label:S.discountLabel||"Discount",mode:S.discountMode||"pct",value:(S.discountMode==="dollar"?S.discountDollar:S.discountPct)||""}];
    S.discountPct="";S.discountDollar="";S.discountLabel="";S.discountMode="pct";
  }
}
function discountTotal(base){
  const arr=Array.isArray(S.discounts)?S.discounts:[];
  let t=0;
  arr.forEach(d=>{
    if(!d)return;
    const v=parseFloat(d.value)||0;
    if(d.mode==='dollar') t+=v;
    else t+=base*v/100;
  });
  if(arr.length===0 && (S.discountPct||S.discountDollar)){
    if(S.discountMode==='dollar') t+=parseFloat(S.discountDollar)||0;
    else t+=base*(parseFloat(S.discountPct)||0)/100;
  }
  return t;
}
function discountLines(base){
  const out=[];
  const arr=Array.isArray(S.discounts)?S.discounts:[];
  arr.forEach(d=>{
    if(!d)return;
    const v=parseFloat(d.value)||0;
    const amt=(d.mode==='dollar')?v:base*v/100;
    if(amt>0)out.push({label:(d.label||'Discount').trim()||'Discount',amount:amt});
  });
  if(out.length===0 && (S.discountPct||S.discountDollar)){
    const amt=S.discountMode==='dollar'?(parseFloat(S.discountDollar)||0):base*(parseFloat(S.discountPct)||0)/100;
    if(amt>0)out.push({label:(S.discountLabel||'Discount').trim()||'Discount',amount:amt});
  }
  return out;
}

const lsSet=(k,v)=>{try{localStorage.setItem(k,v);return true;}catch(e){return false;}};

// Safe JSON.parse with fallback — protects boot path from corrupted localStorage.
// Also type-checks: if the fallback is an array but the parsed value isn't, returns the fallback.
// Protects against manually-edited localStorage values like `mx_jobs="not-an-array"` crashing downstream .filter/.map.
const safeParse=(json,fallback)=>{try{const v=JSON.parse(json);if(v==null)return fallback;if(Array.isArray(fallback)&&!Array.isArray(v))return fallback;return v;}catch(e){return fallback;}};

// ── Lazy-load jsPDF, deduping concurrent calls so two rapid clicks don't load the script twice. ──
function loadJsPDF(){
  if(window.jspdf)return Promise.resolve();
  if(window._jsPDFPromise)return window._jsPDFPromise;
  window._jsPDFPromise=new Promise((resolve,reject)=>{
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
    s.integrity='sha512-qZvrmS2ekKPF2mSznTQsxqPgnpkI4DNTlrdUmTzrDgektczlKNRRhy5X5AAOnx5S09ydFYWWNSfcEqDTTHgtNA==';
    s.crossOrigin='anonymous';s.referrerPolicy='no-referrer';
    s.onload=()=>{window._jsPDFLoaded=true;resolve();};
    s.onerror=()=>{window._jsPDFPromise=null;reject(new Error('jsPDF load failed'));};
    document.head.appendChild(s);
  });
  return window._jsPDFPromise;
}

// ── Lazy-load pdf-lib (cover-merge + contract filling). Was render-blocking in <head>; now
//    fetched on demand the first time a PDF export needs it. SW precaches it for offline use. ──
function loadPdfLib(){
  if(window.PDFLib)return Promise.resolve();
  if(window._pdfLibPromise)return window._pdfLibPromise;
  window._pdfLibPromise=new Promise((resolve,reject)=>{
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js';
    s.integrity='sha512-z8IYLHO8bTgFqj+yrPyIJnzBDf7DDhWwiEsk4sY+Oe6J2M+WQequeGS7qioI5vT6rXgVRb4K1UVQC5ER7MKzKQ==';
    s.crossOrigin='anonymous';s.referrerPolicy='no-referrer';
    s.onload=()=>resolve();
    s.onerror=()=>{window._pdfLibPromise=null;reject(new Error('pdf-lib load failed'));};
    document.head.appendChild(s);
  });
  return window._pdfLibPromise;
}

function hwTotal(it){ return hwDocLines(it).reduce((s,l)=>s+l.amt,0); }
// derived state
function derived(){
  // PET_DOOR_PRICE / FOOT_BOLT_PRICE are now module-scope constants (single source of truth).
  const listPrice=S.items.reduce((s,it)=>{
    if(!it||!it.price)return s;
    let base=(it.price.subtotal||0)*it.qty;
    // Foot bolt & pet door are accessories: one per line item, not multiplied by window qty.
    if(it.footBolt)base+=FOOT_BOLT_PRICE;
    if(it.petDoor&&PET_DOOR_PRICE[it.petDoor])base+=PET_DOOR_PRICE[it.petDoor];

  const totalQty=S.items.reduce((s,it)=>s+(parseInt(it.qty)||0),0);

  const glazingTotal=S.items.reduce((s,it)=>s+((it&&it.price&&it.price.glazeTotal)||0)*it.qty,0);

  // estimate when blank. materialCostIsActual lets the Profit Check label which basis is in play. The
  // markup below applies ONLY to markedUpList (the customer price) — it never touches materialCost.
  const _actualMat=parseFloat(S.actualMatCost);
  const materialCostIsActual=Number.isFinite(_actualMat)&&_actualMat>0;

  // Labor cost for the Profit Check: prefer the rep-entered ACTUAL labor cost; fall back to the auto-computed
  // per-item labor (laborTotal) when blank. Profit-only — the customer quote keeps the auto labor. Allows 0.
  const _actualLabor=parseFloat(S.actualLaborCost);

}

const _toastQueue=[];

function _drainToast(){
  const next=_toastQueue.shift();
  if(!next){_toastActive=null;return;}
  _toastActive=next;
  const old=document.querySelector(".mx-toast");if(old)old.remove();
  const t=document.createElement("div");
  t.className="mx-toast";
  const msgSpan=document.createElement("span");
  msgSpan.textContent=next.message;

  t.appendChild(msgSpan);

  const dismiss=()=>{
    if(!t.parentNode)return;
    t.classList.add("mx-toast-leaving");
    setTimeout(()=>{if(t.parentNode)t.remove();_drainToast();},220);

  };
  if(next.opts.undo){

// ── Maximus CRM write-back ──────────────────────────────────────────────────────
// When a quote that ORIGINATED in the CRM (S.crmLeadId set) is saved or its status
// changes, push the result back to the shared CRM via a Netlify function (service-
// role key, server-side). Fire-and-forget — never blocks or breaks the local save.
// No CRM linkage, or cloud not configured → silent no-op (pure device-only behavior).
function mxCrmWriteback(job){
  try{
    if(!S.crmLeadId) return;
    job = job || {};
    let total = Number(job.salePrice);
    if(!(total>=0)){ try{ const _d=derived(); const _p=S.permitEnabled?(parseFloat(S.permitFee)||0):0; total=Math.max(0,_d.salePrice-_d.discAmt+_p); }catch(_){ total=0; } }
    const payload={
      leadId:S.crmLeadId, quoteId:S.crmQuoteId||null,
      quoteNum:(job.quoteNum!=null?job.quoteNum:S.quoteNum)||"",
      customer:(job.custName!=null?job.custName:S.custName)||"",
      scwpStatus:(job.quoteStatus!=null?job.quoteStatus:S.quoteStatus)||"",
      total:total,
      items:Array.isArray(job.items)?job.items:(Array.isArray(S.items)?S.items:[]),
      rep:(job.repName!=null?job.repName:S.repName)||"",
      soldDate:(job.soldDate!=null?job.soldDate:S.soldDate)||null,
    };
    fetch('/.netlify/functions/crm-writeback',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)})
      .then(r=>(r&&r.ok)?r.json():null)
      .then(res=>{
        if(res&&res.ok){
          if(res.id&&res.id!==S.crmQuoteId){ S.crmQuoteId=res.id; try{persistDraft();}catch(_){} }
          // Tell the embedding CRM the quote round-tripped (AFTER the server confirmed) so it can refresh the lead.
          try{ if(window.parent!==window){ window.parent.postMessage({type:'scwp.saved', leadId:S.crmLeadId, quoteId:S.crmQuoteId, total:payload.total, status:payload.scwpStatus}, location.origin); } }catch(_){}
        }
      })
      .catch(()=>{});
  }catch(_){}
}

  const rows=items.map((it,i)=>{
    const label=it.label||((dispSeries(it)||'')+' '+(typeof dispType==='function'?dispType(it.type||''):(it.type||''))).trim();
    const specLine=[it.frame,it.color].filter(Boolean).join(' · ');
    const noteLines=wrapText(it.m_note||'', COL_NOTE_W-4, 4);
    const descLines=wrapText(label, COL_DESC_W-4, 2);
    const linesNeeded=Math.max(2, noteLines.length||1, descLines.length+1);
    const rowH=Math.max(34, 12*linesNeeded+ROW_PAD_Y*2);
    return {it,i,label,specLine,noteLines,descLines,rowH};
  });

  const bodyTop=MT+HDR_H+20;
  const bodyBottom=PH-MB-FTR_H-6;
  const pages=[]; let cur=[]; let y=bodyTop;
  rows.forEach(r=>{
    if(y+r.rowH>bodyBottom && cur.length){
      pages.push(cur); cur=[]; y=bodyTop;
    }
    cur.push({...r,y});
    y+=r.rowH+ROW_GAP;
  });
  if(cur.length)pages.push(cur);
  const totalPages=Math.max(1,pages.length);

  pages.forEach((pageRows,pIdx)=>{
    if(pIdx>0)doc.addPage();
    drawHeader(pIdx+1,totalPages);

    pageRows.forEach(r=>{
      fill('#FFFFFF');
      stroke('#E2E8F0'); doc.setLineWidth(0.75);
      doc.roundedRect(ML, r.y, CW, r.rowH, 4, 4, 'FD');

      stroke('#F1F5F9'); doc.setLineWidth(0.5);
      let cx=ML+ROW_PAD_X+COL_NUM_W;
      doc.line(cx-2, r.y+4, cx-2, r.y+r.rowH-4);
      cx+=COL_DESC_W;
      doc.line(cx-2, r.y+4, cx-2, r.y+r.rowH-4);
      cx+=COL_QTY_W;
      doc.line(cx-2, r.y+4, cx-2, r.y+r.rowH-4);
      cx+=COL_W2W_W;
      doc.line(cx-2, r.y+4, cx-2, r.y+r.rowH-4);
      cx+=COL_ORD_W;
      doc.line(cx-2, r.y+4, cx-2, r.y+r.rowH-4);

      cx=ML+ROW_PAD_X;
      doc.setFont('helvetica','bold'); doc.setFontSize(11); color('#0A0A0B');
      ltext(String(r.i+1), cx, r.y+ROW_PAD_Y+11);
      cx+=COL_NUM_W;

      let dy=r.y+ROW_PAD_Y+10;
      doc.setFont('helvetica','bold'); doc.setFontSize(9); color('#1A1A2A');
      (r.descLines.length?r.descLines:[r.label||'—']).forEach(line=>{ ltext(fitText(line,COL_DESC_W-4),cx,dy); dy+=11; });
      if(r.specLine){
        doc.setFont('helvetica','normal'); doc.setFontSize(7.5); color('#64748B');
        ltext(fitText(r.specLine,COL_DESC_W-4),cx,dy);
      }
      cx+=COL_DESC_W;

      doc.setFont('helvetica','bold'); doc.setFontSize(10); color('#0A0A0B');
      ctext(String(r.it.qty||'1'), cx+COL_QTY_W/2, r.y+ROW_PAD_Y+12);
      cx+=COL_QTY_W;

      const w2w=(r.it.m_w2wW||r.it.m_w2wH)?((r.it.m_w2wW||'—')+'  ×  '+(r.it.m_w2wH||'—')):'—';
      doc.setFont('helvetica','bold'); doc.setFontSize(10); color('#0A0A0B');
      ctext(fitText(w2w,COL_W2W_W-6), cx+COL_W2W_W/2, r.y+ROW_PAD_Y+12);
      cx+=COL_W2W_W;

      const ord=(r.it.m_ordW||r.it.m_ordH)?((r.it.m_ordW||'—')+'  ×  '+(r.it.m_ordH||'—')):'—';
      doc.setFont('helvetica','bold'); doc.setFontSize(10); color('#0A0A0B');
      ctext(fitText(ord,COL_ORD_W-6), cx+COL_ORD_W/2, r.y+ROW_PAD_Y+12);
      cx+=COL_ORD_W;

      let ny=r.y+ROW_PAD_Y+9;
      doc.setFont('helvetica','italic'); doc.setFontSize(8); color('#4A5568');
      if(r.noteLines.length){
        r.noteLines.forEach(line=>{ ltext(line, cx, ny); ny+=10; });
      } else {
        color('#CBD5E0');
        ltext('—', cx, ny);
      }
    });

    drawFooter(pIdx+1,totalPages);
  });

  const safeName=(job.name||'Quote').replace(/[^a-z0-9\-_]+/gi,'-').replace(/^-+|-+$/g,'');
  doc.save('Measurements-'+safeName+'.pdf');
}
