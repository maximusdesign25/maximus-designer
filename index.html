async function fillContractPDF() {
  if (!_contractPdfBytes) {
    alert('Please tap "Fill Contract" to upload the blank Estimate.pdf first.');
    return;
  }
  if (!S.items.length) { alert('No items to fill.'); return; }

  try {
    await loadPdfLib();   // lazy-load pdf-lib on first contract fill
    const { PDFDocument, StandardFonts, rgb } = PDFLib;
    const pdfDoc = await PDFDocument.load(_contractPdfBytes, { ignoreEncryption: true });
    const _pages = pdfDoc.getPages();
    const page = _pages[0];
    const _page2 = _pages.length > 1 ? _pages[1] : null;
    let _drawPage = page;  // current page for the draw helpers below

    // ── Capacity guard ───────────────────────────────────
    // The template has 16 row slots per page. Each window/door UNIT (qty-expanded) takes one row.
    // Page 2's table is IDENTICAL to page 1 (same columns + same row-Y centers, verified from the
    // 2-page template), so a 2-page template fills 32: rows 1-16 → page 1, rows 17-32 → page 2.
    // A 1-page template stays capped at 16.
    const _rowCap = _page2 ? 32 : 16;
    const _totalUnits = S.items.reduce((s, it) => s + (parseInt(it.qty) || 0), 0);   // match the draw loop (k < it.qty): a blank qty renders 0 rows, not 1
    const _usesPage2 = !!_page2 && _totalUnits > 16;   // page 2 actually carries rows (17-32)
    const _totalPages = _usesPage2 ? 2 : 1;            // "Page 1 of N"
    if (_totalUnits > _rowCap) {
      const _hidden = _totalUnits - _rowCap;
      const _msg = 'This contract template holds ' + _rowCap + ' line rows, but this quote has ' +
        _totalUnits + ' window/door units.\n\nThe last ' + _hidden + ' will NOT appear on the printed contract. ' +
        (_page2 ? 'Split the job across multiple contracts to capture everything.' : 'Upload the 2-page contract template (fills 32), or split the job.') + '\n\n' +
        'OK = fill the first ' + _rowCap + ' anyway   ·   Cancel = stop';
      if (!confirm(_msg)) return;
    }

    // ── Embed fonts ──────────────────────────────────────
    let handFont = null;
    const _fontUrls = [
      'https://cdn.jsdelivr.net/gh/google/fonts@main/ofl/caveat/static/Caveat-Bold.ttf',
      'https://cdn.jsdelivr.net/gh/google/fonts@main/ofl/caveat/static/Caveat-Regular.ttf',
      'https://fonts.gstatic.com/s/caveat/v18/WnznHAc5bAfYB2QRah7pcpNvOx-pjcB9eIWpZA.woff2',
      'https://raw.githubusercontent.com/google/fonts/main/ofl/caveat/static/Caveat-Bold.ttf',
      'https://cdn.jsdelivr.net/gh/google/fonts@main/ofl/patrickhand/PatrickHand-Regular.ttf',
      'https://cdn.jsdelivr.net/gh/google/fonts@main/ofl/architectsdaughter/ArchitectsDaughter.ttf',
      'https://cdn.jsdelivr.net/gh/google/fonts@main/ofl/handlee/Handlee-Regular.ttf',
    ];
    for (const _url of _fontUrls) {
      try {
        const _resp = await fetch(_url, { mode: 'cors', cache: 'force-cache' });
        if (_resp.ok) {
          const _buf = await _resp.arrayBuffer();
          // Only embed TTF fonts (not woff2 which pdf-lib can't handle)
          if (!_url.endsWith('.woff2')) {
            handFont = await pdfDoc.embedFont(_buf);
            break;
          }
        }
      } catch(_e) { /* try next */ }
    }
    if (!handFont) handFont = await pdfDoc.embedFont(StandardFonts.HelveticaBold);

    // ── PDF coordinate system ─────────────────────────────
    // PDF: 612 × 1008 pts. y=0 at BOTTOM. pdfplumber uses y=0 at TOP.
    // Verified from pdfplumber extraction of actual Estimate.pdf.
    // toY(structTop, textH): places text baseline so it sits inside the field line.
    const PH = 1008;
    const toY = (structTop, textH) => PH - structTop - textH;

    // ── Draw helper: shrink-to-fit text in a bounded box ─────────────────
    // Shrinks font size until text fits within maxW. Never truncates — always fits.
    function drawFit(text, x, y, maxW, font, maxSize, color) {
      if (!text) return;
      text = String(text);
      let sz = maxSize;
      const minSz = 3.5;
      while (sz >= minSz) {
        if (font.widthOfTextAtSize(text, sz) <= maxW) break;
        sz -= 0.25;
      }
      // Last resort: hard truncate only if even minSz won't fit
      if (sz < minSz) {
        sz = minSz;
        while (text.length > 1 && font.widthOfTextAtSize(text, sz) > maxW)
          text = text.slice(0, -1);
      }
      _drawPage.drawText(text, { x, y, size: sz, font, color: color || rgb(0,0,0) });
    }

    // ── Draw centered text in a column ────────────────────────────────────
    function drawCenter(text, colX0, colX1, y, font, maxSize, color) {
      if (!text) return;
      text = String(text);
      const colW = colX1 - colX0;
      let sz = maxSize;
      const minSz = 3.5;
      while (sz >= minSz) {
        if (font.widthOfTextAtSize(text, sz) <= colW) break;
        sz -= 0.25;
      }
      if (sz < minSz) {
        sz = minSz;
        while (text.length > 1 && font.widthOfTextAtSize(text, sz) > colW)
          text = text.slice(0, -1);
      }
      const tw = font.widthOfTextAtSize(text, sz);
      const cx = colX0 + (colW - tw) / 2;
      _drawPage.drawText(text, { x: cx, y, size: sz, font, color: color || rgb(0,0,0) });
    }

    // ── Draw a check mark ✓ centered in a checkbox column ─────────────────
    // Drawn as two strokes (NOT a glyph) so it never depends on the embedded
    // font having a ✓ — HelveticaBold/WinAnsi can't encode U+2713.
    // Geometry is sized to the SAME box the old 'X' filled: an 8pt HelveticaBold
    // 'X' is ≈5.3 wide × 5.7 tall sitting on the baseline at baseY, centered in
    // the column — so the check occupies the identical footprint and position.
    const _ckCap = (PDFLib.LineCapStyle && PDFLib.LineCapStyle.Round) != null ? PDFLib.LineCapStyle.Round : undefined;
    function drawCheck(colX0, colX1, baseY, color, scale) {
      const s = scale || 1;
      const cx = (colX0 + colX1) / 2;
      const TH = 2.3 * s;   // BOLD stroke — matches the heavy hand-marked check (tweak this one number for weight)
      const V = { x: cx - 0.9 * s, y: baseY + 0.3 * s };   // bottom vertex (the point of the check) — sits on the baseline
      const L = { x: cx - 2.7 * s, y: baseY + 2.3 * s };   // short arm tip, up-left (left edge of the box)
      const R = { x: cx + 2.9 * s, y: baseY + 6.1 * s };   // long arm tip, up-right (slightly past the box for a confident tail)
      _drawPage.drawLine({ start: L, end: V, thickness: TH, color: color || rgb(0,0,0), lineCap: _ckCap });
      _drawPage.drawLine({ start: V, end: R, thickness: TH, color: color || rgb(0,0,0), lineCap: _ckCap });
    }

    // ── Computed values ───────────────────────────────────
    const D = derived();
    const discAmt = D.discAmt;
    const permitAmt = S.permitEnabled ? (parseFloat(S.permitFee) || 0) : 0;
    const netPrice = D.salePrice + permitAmt - discAmt;

    const black = rgb(0,0,0);
    const blue  = rgb(0.05, 0.05, 0.75);

    // ══════════════════════════════════════════════════════
    // HEADER FIELDS — Y values = exact vertical center of each field line
    // Measured via pdfplumber: mid = (top+bottom)/2, baseline = mid + capH/2
    // For 9pt text capH = 9*0.72/2 = 3.24. All pdf_y in bottom-origin coords.
    //
    //  Field            mid(top-origin)  pdf_y
    //  Owner's Name     183.83           820.93
    //  Owner's Address  202.91           801.85
    //  Job Address      221.99           782.77
    //  Email/Phone      241.07           763.69
    // ══════════════════════════════════════════════════════

    // Owner/customer info — wrapped in a function so page 2 can call it too.
    // OX/OY nudge the WHOLE customer block (name/address/city/state/zip/email/phone) only —
    // item-table coords are unaffected. PDF y is bottom-origin, so OY is SUBTRACTED to move DOWN.
    // +X = right, +DOWN = lower. Tune these two numbers to reposition the block.
    const OX=2, OY=4;
    function _drawOwnerInfo(){
      // Owner's Name
      drawFit(S.custName || '', 75+OX, 827.92-OY, 338, handFont, 9, black);
      // Source — same row as Owner's Name, right side (label ends ~441, blank runs to ~590)
      drawFit(S.custSource || '', 446+OX, 827.92-OY, 140, handFont, 9, black);
      // Owner's Address
      drawFit(S.custAddress || '', 82+OX,  808.84-OY, 222, handFont, 9, black);
      drawFit(S.custCity    || '', 331+OX, 808.84-OY, 110, handFont, 9, black);
      drawCenter(S.custState||'CA',466.4+OX, 507.7+OX, 808.84-OY, handFont, 9, black);
      drawFit(S.custZip     || '', 527+OX, 808.84-OY,  61, handFont, 9, black);
      // Job Address
      drawFit(S.custAddress || '', 67+OX,  789.76-OY, 237, handFont, 9, black);
      drawFit(S.custCity    || '', 331+OX, 789.76-OY, 110, handFont, 9, black);
      drawCenter(S.custState||'CA',466.4+OX, 507.7+OX, 789.76-OY, handFont, 9, black);
      drawFit(S.custZip     || '', 527+OX, 789.76-OY,  61, handFont, 9, black);
      // Email / Phones
      drawFit(S.custEmail || '', 72+OX,  770.68-OY, 222, handFont, 9, black);
      drawFit(S.custPhone || '', 344+OX, 770.68-OY,  99, handFont, 9, black);
      drawFit(S.custPhone || '', 490+OX, 770.68-OY,  99, handFont, 9, black);
    }
    _drawOwnerInfo();
    // Customer info on page 2 as well (its layout is identical to page 1) — only when page 2 is used.
    if (_usesPage2) { _drawPage = _page2; _drawOwnerInfo(); _drawPage = page; }

    // ══════════════════════════════════════════════════════
    // ITEM TABLE — verified column x-boundaries from pdfplumber rect extraction
    //
    //  Col        x0      x1      width
    //  Item No    22.4    40.0    17.6
    //  Room       40.0   116.9    76.9
    //  W         116.9   155.3    38.4
    //  H         155.3   194.5    39.2
    //  Style     194.5   225.0    30.5
    //  Vynl      225.0   245.1    20.1
    //  Alum      245.1   265.3    20.1  (not used — always vinyl)
    //  ClAd      265.3   285.4    20.1
    //  Fib       285.4   305.5    20.1
    //  Wd        305.5   325.6    20.1
    //  Color     325.6   355.8    30.2
    //  GAs       355.7   375.7    20.0
    //  lo-e      375.7   395.6    19.9
    //  temp      395.6   415.5    19.9
    //  obs       415.5   435.5    20.0
    //  Flat      435.5   455.0    19.5
    //  Sclp      455.0   474.5    19.5
    //  STDL      474.5   494.0    19.5
    //  VG        494.0   513.5    19.5
    //  Comments  513.5   589.6    76.1
    //
    // Row structTops from pdfplumber rect bottoms (first cell bottom = next row top):
    //   Row 1 top=282.5 … Row 16 top=537.1, each row ~17pt tall
    // ══════════════════════════════════════════════════════

    // Row pdf_y values — exact vertical centers measured via pdfplumber
    // Each = 1008 - (row_mid_top_origin + 8*0.72/2) where mid=(top+bottom)/2
    // Row height = 16.96pt, measured from rect objects on blank PDF
    const rowPdfY = [
      714.09, 697.12, 680.16, 663.20, 646.23, 629.27,
      612.31, 595.34, 578.38, 561.41, 544.45, 527.49,
      510.52, 493.56, 476.59, 459.63
    ];

    const has = (it, key) => {
      const adds = [...(it.adders||[])];
      // tempered and halftemp both imply infinite (Infinit-e Lo-E)
      if ((adds.includes('tempered') || adds.includes('halftemp')) && !adds.includes('infinite'))
        adds.push('infinite');
      return adds.includes(key);
    };

    const styleMap = {
      'GEO_TRAP':'Trap','GEO_HALF':'Arch','GEO_CIRC':'Circle','Garden Window':'GARDEN',
      'SH':'SH','XO':'XO','XOX':'XOX','PW':'PW',
      'DH':'DH','XX':'XX','CSMT':'CSMT','AWN':'AWN',
      // Keys match rawType AFTER the TL map (which parenthesizes French doors), so these actually hit.
      '2-Panel Patio':'SGD','French Slider (2-Panel)':'FSGD-2','French Slider (3-Panel)':'FSGD-3','French Slider (4-Panel)':'FSGD-4','French Door (X)':'(FD) X','French Door (XO)':'(FD) XO','French Door (XX)':'(FD) XX','French Door (OXXO)':'(FD) OXXO',
      'Side Lite Single':'SL-S','Side Lite Pair':'SL-P'
    };

    let rowIdx = 0;

    for (const it of S.items) {
      const rawType = TL[it.type] || it.type;
      const rowStyle = styleMap[rawType] || rawType;

      // Comments column = the rep's item NOTE only (owner preference). The auto spec abbreviations
      // (premium glass packages, hardware, foot-bolt, pet-door, trapezoid leg, door swing, slide
      // config) are NOT auto-printed here — the column stays blank unless a note was typed for the item.
      const commentStr = (it.note && String(it.note).trim()) ? String(it.note).trim() : '';

      for (let k = 0, _q = parseInt(it.qty) || 0; k < _q; k++, rowIdx++) {
        if (rowIdx >= _rowCap) break;
        // Rows 1-16 → page 1; rows 17-32 → page 2 (continuation table, identical columns & row centers).
        const _onP2 = rowIdx >= 16;
        if (_onP2 && !_page2) break;
        _drawPage = _onP2 ? _page2 : page;
        const _localRow = _onP2 ? rowIdx - 16 : rowIdx;
        const rowY = rowPdfY[_localRow]; // exact vertical center, pre-calculated
        const ckY  = rowY;

        // Room — left-aligned with 5pt padding from left edge (col x0=39.94)
        drawFit(it.label || '', 45, rowY, 70, handFont, 8, black);

        // W — centered in column 116.9–155.3
        drawCenter(String(it.width),  116.9, 155.3, rowY, handFont, 8, black);

        // H — centered in column 155.3–194.5
        drawCenter(String(it.height), 155.3, 194.5, rowY, handFont, 8, black);

        // Style — centered in column 194.5–225.0
        drawCenter(rowStyle, 194.5, 225.0, rowY, handFont, 8, black);

        // Material checkbox — Anlin items are always Vinyl; Custom items use their chosen material.
        // Columns: Vynl 225.0–245.1 · Alum 245.1–265.3 · Clad 265.3–285.4 · Fib 285.4–305.5 · Wd 305.5–325.6
        const _matCols={Vinyl:[225.0,245.1],Aluminum:[245.1,265.3],Clad:[265.3,285.4],Fiberglass:[285.4,305.5],Wood:[305.5,325.6]};
        const _mat=(it.series==='Custom'&&it.customMaterial)?it.customMaterial:'Vinyl';
        const _matCol=_matCols[_mat]||_matCols.Vinyl;
        drawCheck(_matCol[0], _matCol[1], ckY, black);

        // Color abbreviation — centered in 325.6–355.8. Format is exterior/interior
        // (matches the B/W, B/B convention): solid colors are doubled → White = W/W, Tan = T/T.
        const colorAbbr =
          it.color==='White'       ?'W/W' :
          it.color==='Tan'         ?'T/T' :
          it.color==='Adobe'       ?'Adob':
          it.color==='Black/White' ?'B/W':
          it.color==='Black/Black' ?'B/B':
          it.color==='Custom Color'?'Cust':
          it.color==='Earth Tones' ?'Adob':'W/W';
        drawCenter(colorAbbr, 325.6, 355.8, rowY, handFont, 8, black);

        // Class Type checkboxes (centered in their columns):
        if (has(it,'argon'))
          drawCheck(355.7, 375.7, ckY, black); // GAs (Argon) — was missing on the PDF contract
        if (has(it,'infinite'))
          drawCheck(375.7, 395.6, ckY, black); // lo-e
        // TEMP column shows WHICH safety glass this lite uses, not just "some": ✓ = full Tempered,
        // "FC" = Fire Code (1 lite), "1/2" = ½-Tempered. Mutually exclusive (priority temper > FC > ½).
        // All bold — drawCheck is a heavy stroke; handFont (Caveat-Bold / HelveticaBold) is bold for the
        // text marks. Runs on page 1 AND page 2 (the loop switches _drawPage), so both templates match.
        const _safe = it.adders || [];
        if (has(it,'tempered'))
          drawCheck(395.6, 415.5, ckY, black);                          // ✓ full Tempered
        else if (_safe.includes('firecode'))
          drawCenter('FC',  395.6, 415.5, rowY, handFont, 8, black);    // Fire Code (1 lite)
        else if (_safe.includes('halftemp'))
          drawCenter('1/2', 395.6, 415.5, rowY, handFont, 8, black);    // ½-Tempered
        if (has(it,'obscure'))
          drawCheck(415.5, 435.5, ckY, black); // obs

        // Grids checkboxes — only flatgrid and sculptgrid are selectable adders:
        if (has(it,'flatgrid'))
          drawCheck(435.5, 455.0, ckY, black); // Flat
        if (has(it,'sculptgrid'))
          drawCheck(455.0, 474.5, ckY, black); // Sclp

        // Comments column — shrink-to-fit in 513.5–589.6
        if (commentStr)
          drawFit(commentStr, 517, rowY, 71, handFont, 7, black);

      }
      if (rowIdx >= _rowCap) break;
    }
    _drawPage = page; // back to page 1 for totals / comments / owner blocks

    // ── "Page X of Y" — page 1 always (1 of 1, or 1 of 2); page 2 (2 of 2) only when used ──
    // Two blanks on the "Page __ of __" line: page# field x[356-386], total field x[400-430], y≈879.
    drawCenter('1', 356, 386, 879, handFont, 9, black);
    drawCenter(String(_totalPages), 400, 430, 879, handFont, 9, black);
    if (_usesPage2) {
      _drawPage = _page2;
      drawCenter('2', 356, 386, 879, handFont, 9, black);
      drawCenter('2', 400, 430, 879, handFont, 9, black);
      _drawPage = page;
    }

    // ── TOTAL PRICE ──────────────────────────────────────
    // Price box: top-origin 671.21→694.67, center=682.94, height=23.46
    // For 10pt text: baseline = center + capH/2 = 682.94 + 3.6 = 686.54
    // pdf_y = 1008 - 686.54 = 321.46  → text sits perfectly centered in box
    const _pn = Math.round(netPrice * 100) / 100;
    const _pnStr = _pn.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
    _drawPage = page; // price box lives on page 1
    drawFit(_pnStr, 499, 321.46, 97, handFont, 10, black);

    // ── JOB NOTE → printed AFTER the "Comments:" label, on the SAME line ──
    // "Comments:" baseline = y≈427 (measured). Line 1 starts right after the label (x≈90) on
    // that baseline; overflow wraps to the left margin on an EVEN grid below — every line uses
    // the same baseline rhythm anchored to line 1 (no per-line offset), so nothing drifts higher.
    // Overflow notice: when the quote has more units than the contract's row capacity, the extras were
    // dropped from the rows above (the rep was warned at generation). Stamp a note so the SIGNED contract says so.
    const _ovfNote = (_totalUnits > _rowCap) ? ('+' + (_totalUnits - _rowCap) + ' more window/door unit(s) on the attached itemized estimate.') : '';
    const _commentText = [_ovfNote, (S.jobNote || '').trim()].filter(Boolean).join('   ·   ');
    if (_commentText) {
      const _firstY = 427, _pitch = 13.8;           // line-1 baseline + even line spacing
      const _afterX = 90, _cmX = 20, _rightX = 588, _cmSize = 9, _maxLines = 7;
      const _words = String(_commentText).replace(/\s+/g, ' ').trim().split(' ');
      const _placed = [];                            // {x, y, w, text}
      let _li = 0, _x = _afterX, _w = _rightX - _afterX, _cur = '', _full = false;
      const _commit = () => { if (_cur) { _placed.push({ x: _x, y: _firstY - _li * _pitch, w: _w, text: _cur }); _li++; } };
      for (const word of _words) {
        const test = _cur ? _cur + ' ' + word : word;
        if (handFont.widthOfTextAtSize(test, _cmSize) <= _w) { _cur = test; continue; }
        _commit();
        if (_li >= _maxLines) { _full = true; _cur = ''; break; }
        _x = _cmX; _w = _rightX - _cmX; _cur = word;
      }
      if (!_full) _commit();
      else if (_placed.length) { const _l = _placed[_placed.length - 1]; _l.text = _l.text.replace(/.$/, '…'); }
      _drawPage = page;
      _placed.forEach(p => drawFit(p.text, p.x, p.y, p.w, handFont, _cmSize, black));
    }

    // ── FLATTEN → static, non-editable PDF (no fillable form fields) ──
    // Everything we need is drawn on top of the template, so flatten the template's
    // AcroForm fields into static page content. try/catch: no-ops if there's no form,
    // and a flatten error must never block the save.
    try { pdfDoc.getForm().flatten(); } catch (_e) { console.warn('Contract flatten skipped:', _e && _e.message); }

    // ── SAVE / OPEN ───────────────────────────────────────
    const pdfBytes = await pdfDoc.save();
    const blob = new Blob([pdfBytes], { type: 'application/pdf' });
    const url = URL.createObjectURL(blob);
    const custLast = (S.custName || 'Contract').split(' ').pop();
    const filename = custLast + '_Contract.pdf';

    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
    if (isIOS) {
      const newTab = window.open(url, '_blank');
      if (!newTab) {
        _showPdfModal(url, filename);
      } else {
        setTimeout(() => URL.revokeObjectURL(url), 60000);
      }
    } else {
      const a = document.createElement('a');
      a.href = url; a.download = filename;
      document.body.appendChild(a); a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 30000);
    }
  } catch(err) {
    console.error('PDF fill error:', err);
    alert('Error filling PDF: ' + err.message);
  }
}

// Fallback modal for when popup is blocked — shows PDF in an <iframe> with a
// prominent "Open / Share" button so the user can still access the file.
function _showPdfModal(blobUrl, filename) {
  const prev = document.getElementById('__mx_pdf_modal');
  if (prev) prev.remove();

  const modal = document.createElement('div');
  modal.id = '__mx_pdf_modal';
  Object.assign(modal.style, {
    position: 'fixed', inset: '0', zIndex: '10000',
    background: 'rgba(0,0,0,0.92)',
    display: 'flex', flexDirection: 'column',
    fontFamily: 'Georgia,serif'
  });

  // Top bar
  const topBar = document.createElement('div');
  Object.assign(topBar.style, {
    background: '#0B1F3A', padding: '12px 16px',
    display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: '10px'
  });
  const title = document.createElement('span');
  title.textContent = '📄 ' + filename;

// Trigger file upload for the contract PDF
function uploadContractPDF() {
  const inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = 'application/pdf,.pdf';
  inp.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;

    // Show a loading toast so it doesn't feel broken on slow devices
    const toast = document.createElement('div');
    toast.id = '__mx_fill_toast';
    Object.assign(toast.style, {
      position: 'fixed', bottom: '32px', left: '50%', transform: 'translateX(-50%)',
      background: '#0B1F3A', color: '#C9A84C', borderRadius: '14px',
      padding: '14px 24px', fontSize: '15px', fontWeight: 'bold',
      fontFamily: "'Inter',system-ui,sans-serif", zIndex: '20000', boxShadow: '0 4px 20px rgba(0,0,0,0.4)',
      whiteSpace: 'nowrap'
    });
    toast.textContent = '⏳ Filling contract…';
    document.body.appendChild(toast);

    try {
      const buf = await file.arrayBuffer();
      _contractPdfBytes = new Uint8Array(buf);
      // Do NOT call render() here — it wipes the DOM and can cause issues mid-fill
      await fillContractPDF();
    } finally {
      const t = document.getElementById('__mx_fill_toast');
      if (t) t.remove();
    }
  };
  inp.click();
}

    const b=document.createElement('button');
    b.className='pk-btn';

    if(S.pinInput.length>=4)return;

        },900);

    }
  };

// ── Init ──────────────────────────────────────────────────
// Only re-render when the WIDTH actually changes. A height-only resize — e.g. the
// mobile/iPad soft keyboard sliding up — must NOT rebuild the DOM, or it destroys the
// input the user is typing in and drops focus mid-keystroke. Debounced to coalesce bursts.
let _mxRzW=window.innerWidth, _mxRzT=null;
window.addEventListener("resize",()=>{
  S.screenW=window.innerWidth;            // keep width fresh for any render triggered elsewhere
  if(S.screenW===_mxRzW)return;           // height-only change → keep DOM (and focus) intact
  _mxRzW=S.screenW;
  clearTimeout(_mxRzT);
  _mxRzT=setTimeout(render,150);
});
window.addEventListener("orientationchange",()=>{setTimeout(()=>{S.screenW=window.innerWidth;_mxRzW=S.screenW;render();},100);});

// ── Feature 8: keyboard shortcuts ──
document.addEventListener("keydown",e=>{
  // Ignore when typing in inputs (except Esc)
  const tag=(e.target&&e.target.tagName)||"";
  const isField=tag==="INPUT"||tag==="TEXTAREA"||tag==="SELECT"||(e.target&&e.target.isContentEditable);
  // Esc — close any open modal (PIN first since it has its own DOM lifecycle)
  if(e.key==="Escape"){
    if(S.showPin){
      e.preventDefault();
      try{if(typeof window.pinClose==='function')window.pinClose();}catch(_){}
      return;
    }
    // Change-credential / settings-password / price-diff modals (DOM-mounted, not state-flagged)
    const credModal=document.getElementById('__mx_cred_modal');
    const setpwModal=document.getElementById('__st_pw_modal');
    const overlay=document.getElementById('__mx_overlay');
    if(credModal){e.preventDefault();credModal.remove();return;}
    if(setpwModal){e.preventDefault();setpwModal.remove();return;}
    if(overlay){e.preventDefault();overlay.remove();return;}
    const shc=document.getElementById('__mx_shortcuts');
    if(shc){e.preventDefault();shc.remove();return;}
    if(S.showFinance||S.showDiscount||S.showCV||S.showJobNote||S.showBulkApply){
      upd({showFinance:false,showDiscount:false,showCV:false,showJobNote:false,showBulkApply:false});
      e.preventDefault();return;
    }
    if(isField&&e.target.blur){e.target.blur();e.preventDefault();return;}
    // Esc from ANY non-Home screen → back to Home (Add / Quote / Settings / Measure). Measure flushes its autosave first.
    if(S.screen!=="home"){
      e.preventDefault();
      if(S.screen==="measure"){ try{flushMeasurePersist();}catch(_){} upd({screen:"home",measureJob:null}); }
      else upd({screen:"home"});
      return;
    }
  }
  // Enter anywhere on the Add Item screen = click "Add to Quote".
  // Placed BEFORE the isField early-return so it fires while typing in a measurement/qty/label
  // field (the user tabs between fields, then hits Enter to add). saveItem() safely no-ops if
  // the item isn't valid yet (missing size / no price). Skip multiline textareas (future-proof).
  if(e.key==="Enter"&&!e.metaKey&&!e.ctrlKey&&S.screen==="add"&&!(e.target&&e.target.tagName==="TEXTAREA")){
    e.preventDefault();
    saveItem();
    return;
  }
  if(isField)return;
  // First Tab on the Add screen (focus on the header / setup chips / nothing) jumps into the Width box,
  // starting the Width → Height → Qty flow. Tab from BELOW Width flows naturally downward (no hijack).
  if(e.key==="Tab" && !e.shiftKey && S.screen==="add"){
    const w=document.querySelector("[data-field='width']");
    const ae=document.activeElement;
    if(w && (!ae || ae===document.body || (w.compareDocumentPosition(ae) & Node.DOCUMENT_POSITION_PRECEDING))){
      e.preventDefault(); w.focus(); return;
    }
  }
  if(typeof e.key!=='string')return;   // dead/compose keys can yield e.key===undefined → guard the .toLowerCase() calls below
  const mod=e.metaKey||e.ctrlKey;
  // Enter — advance the sales flow: Quote → Customer View → back to Quote.
  // (isField already returned above, so this never fires while typing — including the
  //  labor / discount / permit inputs inside the Customer View modal.)
  if(e.key==="Enter"&&!mod){
    if(S.showFinance||S.showDiscount||S.showPin||S.showJobNote||S.showBulkApply) return; // other modals own Enter
    if(S.showCV){ e.preventDefault(); upd({showCV:false}); return; }    // Customer View → Quote
    if(S.screen==="home"){ e.preventDefault(); resetForm(); upd({screen:"add"}); return; }  // Home → Add Window/Door
    if(S.screen==="quote"&&S.items.length){                             // Quote → Customer View
      e.preventDefault();
      if(!S.quoteNum)upd({quoteNum:"QT-"+Date.now().toString().slice(-6)},true);
      upd({showCV:true});
      return;
    }
  }
  // Cmd/Ctrl+S — save job (on quote screen)
  if(mod&&e.key.toLowerCase()==="s"){
    if(S.screen==="quote"&&S.items.length){e.preventDefault();saveJob();}
    return;
  }
  // Cmd/Ctrl+N — new item
  if(mod&&e.key.toLowerCase()==="n"){
    e.preventDefault();resetForm();upd({screen:"add"});
    return;
  }
  // Cmd/Ctrl+P — print estimate (on quote screen)
  if(mod&&e.key.toLowerCase()==="p"){
    if(S.screen==="quote"&&S.items.length){e.preventDefault();doPrintEstimate();}
    return;
  }
  // Cmd/Ctrl+E — email estimate to client (⇧ = thank-you note). Quote screen or Customer View.
  if(mod&&e.key.toLowerCase()==="e"){
    if(S.screen==="quote"||S.showCV){
      e.preventDefault();
      if(e.shiftKey)doEmailThankYou();
      else if(S.items.length)doEmailEstimate();
    }
    return;
  }
  // Cmd/Ctrl+D — duplicate the last item (Quote screen)
  if(mod&&e.key.toLowerCase()==="d"){
    if(S.screen==="quote"&&S.items.length){e.preventDefault();dupItem(S.items.length-1);showToast("Duplicated last item");}
    return;
  }
  // Cmd/Ctrl+Z — undo the last add / delete / duplicate / reorder (⇧ reserved for redo, not handled)
  if(mod&&!e.shiftKey&&e.key.toLowerCase()==="z"){
    e.preventDefault();_undoLast();
    return;
  }
  // / — focus home search
  if(e.key==="/"&&S.screen==="home"&&S.pinUnlocked){
    const si=document.getElementById("mx_home_search");
    if(si){e.preventDefault();si.focus();si.select();}
  }
  // ? — toggle the keyboard-shortcuts cheat sheet
  if(e.key==="?"){ e.preventDefault(); _toggleShortcutsHelp(); }
});

// Fresh-start-on-launch: last session's in-progress quote was loaded into S by _restoreDraft. If it has
// a customer name AND at least one item, auto-save it into Saved Quotes (so the rep re-opens it from the
// list — never lost); otherwise it's discarded. Then reset to a fresh blank quote on Home. (All synchronous
// here, behind the license gate, so no visible flash.) saveJob is name-aware → editing-a-loaded-job updates
// it rather than duplicating.
let _bootSaved=true;
try{
  if((S.custName||"").trim() && Array.isArray(S.items) && S.items.length>0) _bootSaved=saveJob(true);
}catch(_){ _bootSaved=false; }
// Only reset to a fresh quote once the in-progress quote is safely in Saved Quotes. If the auto-save FAILED
// (e.g. storage full → saveJob returns false), skip the reset so newQuote()'s persistDraft() doesn't overwrite
// mx_draft with a blank quote — otherwise last session's work would be lost from BOTH mx_jobs and mx_draft.
if(_bootSaved){ try{ newQuote(); }catch(_){} }

// ── Maximus CRM hand-off ───────────────────────────────────────────────────────
// If launched from the CRM (…/?crm=1&name=…&email=…&leadId=…), prefill the customer
// onto the now-fresh quote, link it back to the CRM lead, and reveal the Customer
// Info card on Home so the rep can confirm and start adding items. Fully additive
// and guarded: a normal launch (no params) is untouched. The URL is then scrubbed
// so a refresh can't re-trigger it or leave the customer's details in the address bar.
(function _crmHandoff(){
  try{
    const p=new URLSearchParams(location.search);
    if(p.get("crm")!=="1" && !p.get("name") && !p.get("leadId")) return;
    const g=(k)=>{ const v=p.get(k); return v==null?"":String(v).slice(0,200).trim(); };
    const name=g("name");
    upd({
      custName:name||S.custName,
      custEmail:g("email")||S.custEmail,
      custPhone:formatPhone(g("phone"))||S.custPhone,
      custAddress:g("address")||S.custAddress,
      custCity:g("city")||S.custCity,
      custState:g("state")||S.custState||"CA",
      custZip:g("zip")||S.custZip,
      custSource:g("source")||S.custSource,
      crmLeadId:g("leadId")||null,
      crmQuoteId:g("quoteId")||null,
      screen:"home", hideHomeCust:false,
    });
    try{ persistDraft(); }catch(_){}
    try{ showToast("Quote started for "+(name||"customer")+" — from Maximus CRM",{duration:4000}); }catch(_){}
    try{ history.replaceState(null,"",location.pathname); }catch(_){}
  }catch(_){}
})();

// The signed-contract attachment feature was removed. Strip any leftover signedContract blob from saved
// quotes so the localStorage space it held is reclaimed. One-time + idempotent (no-op once clean).
try{

  if(Array.isArray(_cj)){
    let _cch=false;
    _cj.forEach(x=>{ if(x && typeof x==='object' && 'signedContract' in x){ delete x.signedContract; _cch=true; } });
    if(_cch && lsSet("mx_jobs", JSON.stringify(_cj))) S.savedJobs=_cj;
  }
}catch(_){}

// Photo storage init (async, non-blocking): migrate any legacy inline-base64 photos in saved jobs

try{ mxPhotoMigrate().then(()=>mxPhotoGC()).catch(()=>{}); }catch(_){}

<script>
(function registerSW() {
  // Embedded inside the Maximus CRM (same-origin iframe at /designer/) -> do NOT register the
  // designer's own service worker; the CRM's root SW owns caching. Two SWs at scope '/' would
  // fight over navigations. Standalone scwp2.netlify.app is the top-level page, so it still registers.
  try { if (window.self !== window.top || sessionStorage.getItem('scwp_crm_session') === '1') return; } catch (e) { return; }
  if (!('serviceWorker' in navigator)) {
    console.info('[SW] Service Workers not supported in this browser.');
    return;
  }
  window.addEventListener('load', async () => {
    try {
      const reg = await navigator.serviceWorker.register('/sw.js', {
        scope: '/',
        updateViaCache: 'none',
      });
      reg.addEventListener('updatefound', () => {
        const newWorker = reg.installing;
        if (!newWorker) return;
        newWorker.addEventListener('statechange', () => {
          if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
            console.info('[SW] New version available. Reload to update MAXIMUS PRO.');
          }
        });
      });
      console.info('[SW] Registered successfully, scope:', reg.scope);
    } catch (err) {
      console.error('[SW] Registration failed:', err);
    }
  });
})();
</script>
