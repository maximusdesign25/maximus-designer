// ──────────────────────────────────────────────────────────
// SERIES PREVIEW MODAL — shows ANLIN lifestyle photo + operating diagram
// for the selected series/type. Read-only; tap backdrop or ✕ to close.
// Inputs: {series, type, width, height, frame, color, label}
// ──────────────────────────────────────────────────────────
function openPreview(spec){
  const c=C();const dk=S.darkMode;
  const ser=spec&&spec.series;if(!ser)return;
  const blurb=SERIES_BLURBS[ser]||"";
  const tDisp=(typeof dispType==='function'?dispType(spec.type):spec.type)||"";

  document.body.classList.add('mx-locked');
  const ov=document.createElement('div');
  ov.id='__mx_preview_modal';
  Object.assign(ov.style,{position:'fixed',inset:'0',zIndex:'9200',display:'flex',alignItems:'center',justifyContent:'center',background:'rgba(10,15,30,.62)',backdropFilter:'blur(16px)',WebkitBackdropFilter:'blur(16px)',padding:'20px',animation:'mxFadeIn .18s ease-out'});
  try{mxA11yModal(ov,'Design Preview');}catch(_){}

  const box=document.createElement('div');
  Object.assign(box.style,{background:c.card,borderRadius:'24px',border:'1px solid '+c.border,maxWidth:'600px',width:'100%',maxHeight:'92vh',overflowY:'auto',boxShadow:'0 24px 70px rgba(0,0,0,.5)',animation:'mxSlideUp .22s cubic-bezier(.2,.8,.2,1)',position:'relative',WebkitOverflowScrolling:'touch'});

  // Close X (top-right, floating)
  const closeBtn=document.createElement('button');
  closeBtn.setAttribute('aria-label','Close preview');
  closeBtn.innerHTML='✕';
  Object.assign(closeBtn.style,{position:'absolute',top:'14px',right:'14px',zIndex:'2',background:dk?'rgba(255,255,255,.08)':'rgba(10,10,15,.06)',color:c.text,border:'1px solid '+c.border,borderRadius:'50%',width:'34px',height:'34px',fontSize:'15px',fontWeight:'600',cursor:'pointer',padding:'0'});
  const closeModal=()=>{
    document.removeEventListener('keydown',keyH);   // remove on EVERY close path (X / Done / backdrop / Esc) — not just Esc
    ov.style.animation='mxFadeIn .14s reverse';
    setTimeout(()=>{try{ov.remove();}catch(_){}try{document.body.classList.toggle('mx-locked',!!(S.showFinance||S.showDiscount||S.showCV||S.showPin));}catch(_){}},120);
  };
  closeBtn.addEventListener('click',closeModal);
  box.appendChild(closeBtn);

  // Body
  const body=document.createElement('div');
  Object.assign(body.style,{padding:'26px 28px 24px'});

  // Series chip (top, replaces hero overlay)
  const serChip=document.createElement('div');
  Object.assign(serChip.style,{display:'inline-block',background:dk?'rgba(212,180,122,0.12)':'rgba(184,149,106,0.10)',border:'1px solid '+(dk?'rgba(212,180,122,0.28)':'rgba(184,149,106,0.30)'),color:c.accent,padding:'5px 11px',borderRadius:'20px',fontSize:'10px',fontWeight:'600',fontFamily:"'JetBrains Mono',monospace",letterSpacing:'0.18em',textTransform:'uppercase',marginBottom:'12px'});
  // Brand chip: genuine Anlin series show "ANLIN · <series>"; non-Anlin ("Other"/Custom) items
  // show their own brand (e.g. "MILGARD · XO") so the preview never mislabels a non-Anlin unit.
  serChip.textContent=(ser==="Custom")
    ? ((spec.customBrand&&spec.customBrand.trim()?spec.customBrand.trim():'Other')+' · '+tDisp).toUpperCase()
    : ('ANLIN · '+ser).toUpperCase();
  body.appendChild(serChip);

  // Title
  const ttl=document.createElement('div');
  Object.assign(ttl.style,{fontFamily:"'Fraunces',Georgia,serif",fontSize:'24px',fontWeight:'500',color:c.text,letterSpacing:'-0.02em',marginBottom:'4px',lineHeight:'1.15'});
  ttl.textContent=(spec.label&&spec.label.trim())?spec.label:(ser+' · '+tDisp);
  body.appendChild(ttl);

  // Subtitle (series · type)
  const sub=document.createElement('div');
  Object.assign(sub.style,{fontFamily:"'JetBrains Mono',monospace",fontSize:'10.5px',fontWeight:'500',color:c.accent,letterSpacing:'0.14em',textTransform:'uppercase',marginBottom:'14px'});
  sub.textContent=ser+' · '+tDisp;
  body.appendChild(sub);

  // Blurb
  if(blurb){
    const bl=document.createElement('div');
    Object.assign(bl.style,{fontSize:'13px',color:c.muted,lineHeight:'1.5',marginBottom:'18px'});
    bl.textContent=blurb;
    body.appendChild(bl);
  }

  // ── Operating Diagram section ──
  const isDoorType  = (typeof _DOOR_SWING_TYPES !== 'undefined') && _DOOR_SWING_TYPES.has(spec.type);
  // A bare X/O signature (e.g. "XX") is operable whether the toggle reads it as a
  // sliding window or a swinging door, so the open animation is offered for both.
  const _xoSig      = /^[XO]{2,}$/.test(String(spec.type||'').trim().toUpperCase().replace(/\s+/g,''));
  const isOperable  = ((typeof _OPERABLE_TYPES !== 'undefined') && _OPERABLE_TYPES.has(spec.type)) || _xoSig;
  const diagHeader=document.createElement('div');
  Object.assign(diagHeader.style,{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'8px',gap:'12px'});
  const diagLbl=document.createElement('div');
  Object.assign(diagLbl.style,{fontFamily:"'JetBrains Mono',monospace",fontSize:'9.5px',fontWeight:'600',color:c.muted,letterSpacing:'0.22em',textTransform:'uppercase'});
  diagLbl.textContent='Operating Style · '+tDisp;
  diagHeader.appendChild(diagLbl);

  // Closed/Open toggle — any OPERABLE type (excludes PW + GEO). Default: Closed.
  // Doors show "Inswing · Open" or "Outswing · Open"; windows just show "Open".
  let viewState = 'closed';
  let toggleRefs = null;
  if (isOperable) {
    const toggle=document.createElement('div');
    Object.assign(toggle.style,{display:'inline-flex',background:dk?'rgba(255,255,255,.06)':'rgba(10,10,15,.05)',border:'1px solid '+c.border,borderRadius:'10px',padding:'2px',gap:'2px'});
    const mkPill=(label,active)=>{
      const b=document.createElement('button');
      b.textContent=label;
      Object.assign(b.style,{
        background:active?(dk?'#FAFAF7':'#0A0A0B'):'transparent',
        color:active?(dk?'#0A0A0B':'#FAFAF7'):c.muted,
        border:'none',borderRadius:'8px',padding:'5px 10px',
        fontFamily:"'JetBrains Mono',monospace",fontSize:'9.5px',fontWeight:'700',
        letterSpacing:'0.14em',textTransform:'uppercase',cursor:'pointer',
        transition:'background .15s, color .15s'
      });
      return b;
    };
    const openLabel = isDoorType
      ? ((spec.swing==='outswing'?'Outswing':'Inswing')+' · Open')
      : 'Open';
    const closedPill = mkPill('Closed', true);
    const openPill = mkPill(openLabel, false);
    toggleRefs = {closedPill, openPill};
    toggle.appendChild(closedPill);
    toggle.appendChild(openPill);
    diagHeader.appendChild(toggle);
  }
  body.appendChild(diagHeader);

  const diagWrap=document.createElement('div');
  Object.assign(diagWrap.style,{background:dk?'rgba(255,255,255,.03)':'#FAFAF7',border:'1px solid '+c.border,borderRadius:'14px',padding:'26px 26px 22px',marginBottom:'18px',display:'flex',alignItems:'center',justifyContent:'center'});

  // Dimension callouts wrap the diagram in a 2×2 grid:
  //   [ ↕ height ] [   diagram   ]
  //   [          ] [  ↔ width   ]
  // Only shown when real W×H exist; otherwise the SVG sits alone, centered.
  const hasDims = !!(spec.width && spec.height);
  // Measurement labels: near-black for readability (was gold/accent — hard to read on the light stage).
  const dimColor = dk ? '#F0F0F0' : '#15171C';
  // Trapezoid short-leg callout: GEO_TRAP with a Leg Height shows the short side's height too.
  const _isTrap = (typeof TL!=='undefined' && TL[spec.type]==='GEO_TRAP');
  const _legH = (_isTrap && spec.legHeight && String(spec.legHeight).trim()) ? String(spec.legHeight).trim() : '';
  const _legSide = (spec.trapSide==='Right') ? 'Right' : 'Left';   // which side is the SHORT leg
  const diagStage=document.createElement('div');
  const diagInner=document.createElement('div');
  Object.assign(diagInner.style,{width:'100%',maxWidth:'440px',display:'flex',alignItems:'center',justifyContent:'center'});
  if (hasDims){
    // 3-column grid so a trapezoid can show a leg-height label on the opposite side from the tall height.
    Object.assign(diagStage.style,{display:'grid',gridTemplateColumns:'auto minmax(0,1fr) auto',gridTemplateRows:'1fr auto',columnGap:'10px',rowGap:'8px',alignItems:'center',width:'100%',maxWidth:'500px'});
    const dimLbl=(txt,vert)=>{
      const d=document.createElement('div');
      d.textContent=txt;
      Object.assign(d.style,{fontFamily:"'JetBrains Mono',monospace",fontSize:'12px',fontWeight:'700',color:dimColor,letterSpacing:'0.06em',textAlign:'center',whiteSpace:'nowrap'});
      if(vert){d.style.writingMode='vertical-rl';d.style.transform='rotate(180deg)';}
      return d;
    };
    // Tall height sits on the side OPPOSITE the short leg (leg Left → tall on right, and vice-versa).
    const _tallCol = (_legH && _legSide==='Left') ? '3' : '1';
    const _legCol  = (_tallCol==='1') ? '3' : '1';
    const hLbl=dimLbl('↕ '+spec.height+'″', true);
    Object.assign(hLbl.style,{gridColumn:_tallCol,gridRow:'1',justifySelf:'center',alignSelf:'center'});
    const wLbl=dimLbl('↔ '+spec.width+'″', false);
    Object.assign(wLbl.style,{gridColumn:'2',gridRow:'2',justifySelf:'center'});
    diagInner.style.gridColumn='2';diagInner.style.gridRow='1';
    diagStage.appendChild(hLbl);
    diagStage.appendChild(diagInner);
    diagStage.appendChild(wLbl);
    // Short-leg height label (trapezoid only, when entered) — opposite the tall side.
    if(_legH){
      const legLbl=dimLbl('↕ '+_legH+'″', true);
      Object.assign(legLbl.style,{gridColumn:_legCol,gridRow:'1',justifySelf:'center',alignSelf:'center',opacity:'0.92'});
      diagStage.appendChild(legLbl);
    }
  } else {
    Object.assign(diagStage.style,{display:'flex',alignItems:'center',justifyContent:'center',width:'100%'});
    diagStage.appendChild(diagInner);
  }

  const renderDiagram = () => {
    let svg;
    if (spec.type === 'Combination') {
      svg = comboDiagram(spec.sections, spec.comboOrientation, {color:spec.color, adders:spec.adders, dark:dk, scale:1.1});
    }
    if (!svg && isOperable && viewState === 'open' && typeof typeDiagramOpen === 'function') {
      svg = typeDiagramOpen(spec.type, {color:spec.color, adders:spec.adders, swing:spec.swing, slide:spec.slide, kind:spec.customKind, dark:dk, width:spec.width, height:spec.height, trapSide:spec.trapSide, scale:1.5});
    }
    if (!svg) {
      svg = typeDiagram(spec.type, {color:spec.color, adders:spec.adders, swing:spec.swing, slide:spec.slide, kind:spec.customKind, dark:dk, width:spec.width, height:spec.height, trapSide:spec.trapSide, showArrows:true, scale:1.5});
    }
    diagInner.innerHTML = svg;
    const _s = diagInner.querySelector('svg');
    if (_s) Object.assign(_s.style,{width:'100%',maxWidth:'440px',height:'auto'});
  };
  renderDiagram();
  diagWrap.appendChild(diagStage);
  if (toggleRefs) {
    const setView = (which) => {
      const wasOpen = (viewState==='open');
      viewState = which;
      const dkOn = dk;
      toggleRefs.closedPill.style.background = which==='closed' ? (dkOn?'#FAFAF7':'#0A0A0B') : 'transparent';
      toggleRefs.closedPill.style.color = which==='closed' ? (dkOn?'#0A0A0B':'#FAFAF7') : c.muted;
      toggleRefs.openPill.style.background = which==='open' ? (dkOn?'#FAFAF7':'#0A0A0B') : 'transparent';
      toggleRefs.openPill.style.color = which==='open' ? (dkOn?'#0A0A0B':'#FAFAF7') : c.muted;
      // CLOSE: going open → closed, smoothly animate the open sashes shut (transition the held-open
      // transform back to closed), THEN render the static closed view. Avoids the instant snap.
      if (which==='closed' && wasOpen){
        try{
          const sashes=[...diagInner.querySelectorAll('.mxp-sash')].filter(s=>[...s.classList].some(cl=>cl.indexOf('a-')===0));
          if (sashes.length){
            sashes.forEach(s=>{ const cur=getComputedStyle(s).transform;
              s.style.animation='none'; s.style.transform=(cur&&cur!=='none')?cur:''; void s.offsetWidth;
              s.style.transition='transform 1.25s cubic-bezier(.45,0,.5,1)'; s.style.transform='none'; });
            setTimeout(()=>{ if(viewState==='closed') renderDiagram(); }, 1340);
            return;
          }
        }catch(_){}
      }
      renderDiagram();
    };
    toggleRefs.closedPill.addEventListener('click', ()=>setView('closed'));
    toggleRefs.openPill.addEventListener('click', ()=>setView('open'));
  }
  body.appendChild(diagWrap);

  // ── Read-only config swatches (Color · Glass · Grid) ──
  // Mirrors the configured spec visually. NOT editable controls — preview is
  // read-only by design (see hidden-features/no-new-affordances guidance).
  {
    const aSet = new Set(spec.adders || []);
    const isObscure = aSet.has('obscure'), isTempered = aSet.has('tempered');
    const isFlat = aSet.has('flatgrid'), isSculpt = aSet.has('sculptgrid');
    const pal = (typeof framePalette === 'function') ? framePalette(spec.color) : null;

    let glassLabel = 'Clear';
    if (isObscure && isTempered) glassLabel = 'Obscure · Temp';
    else if (isObscure) glassLabel = 'Obscure';
    else if (isTempered) glassLabel = 'Tempered';
    let glassBg = 'linear-gradient(135deg,#AEC6DC,#5E7E9C)';
    if (isObscure) glassBg = 'repeating-linear-gradient(45deg,#E4ECF0 0,#E4ECF0 3px,#CAD8E0 3px,#CAD8E0 6px)';
    else if (isTempered) glassBg = 'linear-gradient(135deg,#B8D2C4,#7FA088)';

    let gridLabel = 'None';
    if (isSculpt) gridLabel = 'Sculptured';
    else if (isFlat) gridLabel = 'Flat';

    const swRow = document.createElement('div');
    Object.assign(swRow.style, {display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'10px',marginBottom:'18px'});
    const mkSwatch = (kicker, value, bg, innerHTML) => {
      const chip = document.createElement('div');
      Object.assign(chip.style, {display:'flex',flexDirection:'column',gap:'7px',minWidth:'0'});
      const sw = document.createElement('div');
      Object.assign(sw.style, {height:'40px',borderRadius:'10px',border:'1px solid '+c.border,background:bg,overflow:'hidden'});
      if (innerHTML) sw.innerHTML = innerHTML;
      const k = document.createElement('div');
      k.textContent = kicker;
      Object.assign(k.style, {fontFamily:"'JetBrains Mono',monospace",fontSize:'8.5px',fontWeight:'600',color:c.muted,letterSpacing:'0.18em',textTransform:'uppercase',marginBottom:'2px'});
      const v = document.createElement('div');
      v.textContent = value;
      Object.assign(v.style, {fontSize:'12px',fontWeight:'600',color:c.text,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'});
      const txt = document.createElement('div');
      txt.appendChild(k); txt.appendChild(v);
      chip.appendChild(sw); chip.appendChild(txt);
      return chip;
    };

    const colorBg = pal ? `linear-gradient(135deg, ${pal.hi||pal.top}, ${pal.bot})` : '#D4D6DA';
    swRow.appendChild(mkSwatch('Color', spec.color || 'White', colorBg));
    swRow.appendChild(mkSwatch('Glass', glassLabel, glassBg));
    const gridSvg = (gridLabel !== 'None')
      ? `<svg viewBox="0 0 40 40" preserveAspectRatio="none" width="100%" height="100%"><rect width="40" height="40" fill="${dk?'#1A1D22':'#EEF1F4'}"/><g stroke="${c.muted}" stroke-width="${isSculpt?2.4:1.1}" opacity="0.8"><line x1="20" y1="0" x2="20" y2="40"/><line x1="0" y1="20" x2="40" y2="20"/></g></svg>`
      : '';
    swRow.appendChild(mkSwatch('Grid', gridLabel, gridLabel!=='None' ? 'transparent' : (dk?'rgba(255,255,255,.05)':'#EEF1F4'), gridSvg));
    body.appendChild(swRow);
  }

  // ── Specs (if available) ──
  const specRows=[];
  if(spec.width&&spec.height)specRows.push(['Size',spec.width+'″ W × '+spec.height+'″ H']);
  if(spec.frame)specRows.push(['Frame',spec.frame]);
  if(spec.color)specRows.push(['Color',spec.color]);
  if(spec.adders&&spec.adders.length){
    const addLabels=spec.adders.map(k=>{
      const a=(typeof ADDER_OPTS!=='undefined')?ADDER_OPTS.find(o=>o.key===k):null;
      return a?a.label:k;
    }).join(', ');
    specRows.push(['Options',addLabels]);
  }
  if(specRows.length){
    const sLbl=document.createElement('div');
    Object.assign(sLbl.style,{fontFamily:"'JetBrains Mono',monospace",fontSize:'9.5px',fontWeight:'600',color:c.muted,letterSpacing:'0.22em',textTransform:'uppercase',marginBottom:'8px'});
    sLbl.textContent='Specifications';
    body.appendChild(sLbl);
    const sGrid=document.createElement('div');
    Object.assign(sGrid.style,{display:'grid',gridTemplateColumns:'90px 1fr',rowGap:'6px',columnGap:'14px',fontSize:'13px',marginBottom:'18px'});
    specRows.forEach(([k,v])=>{
      const kd=document.createElement('div');kd.textContent=k;Object.assign(kd.style,{color:c.muted,fontWeight:'500'});
      const vd=document.createElement('div');vd.textContent=v;Object.assign(vd.style,{color:c.text,fontWeight:'500'});
      sGrid.appendChild(kd);sGrid.appendChild(vd);
    });
    body.appendChild(sGrid);
  }

  // Done button
  const doneBtn=document.createElement('button');
  doneBtn.textContent='Done';
  Object.assign(doneBtn.style,{width:'100%',background:c.navy,color:dk?c.bg:'#FFFFFF',border:'none',borderRadius:'14px',padding:'14px',fontSize:'14px',fontWeight:'600',letterSpacing:'-0.005em',cursor:'pointer',fontFamily:"'Outfit',system-ui,sans-serif"});
  doneBtn.addEventListener('click',closeModal);
  body.appendChild(doneBtn);

  box.appendChild(body);
  ov.appendChild(box);
  // Backdrop click closes
  ov.addEventListener('click',e=>{if(e.target===ov)closeModal();});
  // Escape key
  const keyH=e=>{if(e.key==='Escape')closeModal();};
  document.addEventListener('keydown',keyH);
  document.body.appendChild(ov);
}

// ──────────────────────────────────────────────────────────
// IN-APP CAMERA (iOS-style) — getUserMedia + canvas capture
// All settings (facing, flash, grid, mirror) persist via localStorage.
// Falls back to file picker if camera unavailable / permission denied.
// ──────────────────────────────────────────────────────────
async function openCamera(onCapture){
  const hasGUM=!!(navigator.mediaDevices&&navigator.mediaDevices.getUserMedia);
  if(!hasGUM){_fallbackFilePicker(onCapture);return;}

  const ov=document.createElement('div');
  ov.id='__mx_cam';
  Object.assign(ov.style,{
    position:'fixed',inset:'0',zIndex:'10000',
    background:'#000',display:'flex',flexDirection:'column',
    fontFamily:"'Inter Tight',system-ui,-apple-system,sans-serif",
    color:'#fff',overflow:'hidden'
  });
  mxA11yModal(ov,'Camera');
  // Focus trap added after stream starts (see end of openCamera)

  const video=document.createElement('video');
  Object.assign(video.style,{
    position:'absolute',inset:'0',width:'100%',height:'100%',
    objectFit:'cover',background:'#000'
  });
  video.setAttribute('playsinline','');
  video.setAttribute('autoplay','');
  video.muted=true;
  ov.appendChild(video);

  const grid=document.createElement('div');
  grid.id='__mx_cam_grid';
  Object.assign(grid.style,{
    position:'absolute',inset:'0',pointerEvents:'none',
    display:S.camGrid?'block':'none'
  });
  grid.innerHTML=`<svg viewBox="0 0 3 3" preserveAspectRatio="none" style="position:absolute;inset:0;width:100%;height:100%;opacity:.35"><line x1="1" y1="0" x2="1" y2="3" stroke="#fff" stroke-width="0.01"/><line x1="2" y1="0" x2="2" y2="3" stroke="#fff" stroke-width="0.01"/><line x1="0" y1="1" x2="3" y2="1" stroke="#fff" stroke-width="0.01"/><line x1="0" y1="2" x2="3" y2="2" stroke="#fff" stroke-width="0.01"/></svg>`;
  ov.appendChild(grid);

  const topBar=document.createElement('div');
  Object.assign(topBar.style,{
    position:'absolute',top:'0',left:'0',right:'0',
    padding:'calc(14px + env(safe-area-inset-top)) 22px 14px',
    display:'flex',alignItems:'center',justifyContent:'space-between',
    background:'linear-gradient(to bottom, rgba(0,0,0,.55), rgba(0,0,0,0))',
    zIndex:'10'
  });

  const iconBtn=(svg,onClick,opts={})=>{
    const b=document.createElement('button');
    Object.assign(b.style,{
      background:opts.active?'#FFCC00':'rgba(0,0,0,.35)',
      color:opts.active?'#000':'#fff',border:'none',
      width:'40px',height:'40px',borderRadius:'50%',cursor:'pointer',
      display:'inline-flex',alignItems:'center',justifyContent:'center',
      padding:'0',transition:'background .15s',
      WebkitTapHighlightColor:'transparent',touchAction:'manipulation'
    });
    b.innerHTML=svg;
    b.addEventListener('click',onClick);
    if(opts.label)b.setAttribute('aria-label',opts.label);
    return b;
  };

  const closeBtn=iconBtn(
    `<svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M5 5L17 17M17 5L5 17" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>`,
    ()=>cleanup(null),
    {label:'Close camera'}
  );
  topBar.appendChild(closeBtn);

  const midGroup=document.createElement('div');
  Object.assign(midGroup.style,{display:'flex',gap:'8px',alignItems:'center'});

  const flashSvg=(on)=>on
    ? `<svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M11.5 1.5L4 11.5H9.5L8.5 18.5L16 8.5H10.5L11.5 1.5Z" fill="currentColor"/></svg>`
    : `<svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M11.5 1.5L4 11.5H9.5L8.5 18.5L16 8.5H10.5L11.5 1.5Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><line x1="3" y1="3" x2="18" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>`;
  const flashBtn=iconBtn(flashSvg(S.camFlash),async ()=>{
    // Pre-check torch capability before toggling state — avoids false-on UI when hardware doesn't support
    const caps=(track&&track.getCapabilities)?track.getCapabilities():{};
    if(!caps.torch){
      showErr('Flash not available on this camera.');
      setTimeout(()=>{errBox.style.display='none';},1800);
      return;
    }
    S.camFlash=!S.camFlash;
    persist();
    flashBtn.innerHTML=flashSvg(S.camFlash);
    flashBtn.style.background=S.camFlash?'#FFCC00':'rgba(0,0,0,.35)';
    flashBtn.style.color=S.camFlash?'#000':'#fff';
    await applyTorch();
  },{active:S.camFlash,label:'Toggle flash'});
  midGroup.appendChild(flashBtn);

  const gridSvg=`<svg width="20" height="20" viewBox="0 0 20 20" fill="none"><rect x="3" y="3" width="14" height="14" stroke="currentColor" stroke-width="1.5"/><line x1="3" y1="8.67" x2="17" y2="8.67" stroke="currentColor" stroke-width="1.5"/><line x1="3" y1="13.33" x2="17" y2="13.33" stroke="currentColor" stroke-width="1.5"/><line x1="8.67" y1="3" x2="8.67" y2="17" stroke="currentColor" stroke-width="1.5"/><line x1="13.33" y1="3" x2="13.33" y2="17" stroke="currentColor" stroke-width="1.5"/></svg>`;
  const gridBtn=iconBtn(gridSvg,()=>{
    S.camGrid=!S.camGrid;
    persist();
    grid.style.display=S.camGrid?'block':'none';
    gridBtn.style.background=S.camGrid?'#FFCC00':'rgba(0,0,0,.35)';
    gridBtn.style.color=S.camGrid?'#000':'#fff';
  },{active:S.camGrid,label:'Toggle grid'});
  midGroup.appendChild(gridBtn);

  const mirrorSvg=`<svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M10 3V17M4 6L4 14M16 6L16 14M2 10H6M14 10H18" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>`;
  const mirrorBtn=iconBtn(mirrorSvg,()=>{
    S.camMirror=!S.camMirror;
    persist();
    applyMirror();
    mirrorBtn.style.background=S.camMirror?'#FFCC00':'rgba(0,0,0,.35)';
    mirrorBtn.style.color=S.camMirror?'#000':'#fff';
  },{active:S.camMirror,label:'Mirror selfie'});
  mirrorBtn.style.display=S.camFacing==='user'?'inline-flex':'none';
  midGroup.appendChild(mirrorBtn);

  topBar.appendChild(midGroup);
  topBar.appendChild(document.createElement('div'));
  ov.appendChild(topBar);

  const botBar=document.createElement('div');
  Object.assign(botBar.style,{
    position:'absolute',bottom:'0',left:'0',right:'0',
    padding:'18px 32px calc(28px + env(safe-area-inset-bottom))',
    display:'flex',alignItems:'center',justifyContent:'space-between',
    background:'linear-gradient(to top, rgba(0,0,0,.65), rgba(0,0,0,0))',
    zIndex:'10'
  });

  const leftSpacer=document.createElement('div');
  Object.assign(leftSpacer.style,{width:'46px',height:'46px'});
  botBar.appendChild(leftSpacer);

  const shutterWrap=document.createElement('button');
  Object.assign(shutterWrap.style,{
    width:'76px',height:'76px',borderRadius:'50%',
    border:'4px solid #fff',background:'transparent',
    padding:'4px',cursor:'pointer',
    display:'inline-flex',alignItems:'center',justifyContent:'center',
    WebkitTapHighlightColor:'transparent',touchAction:'manipulation',
    transition:'transform .08s'
  });
  shutterWrap.setAttribute('aria-label','Take photo');
  const shutterInner=document.createElement('div');
  Object.assign(shutterInner.style,{
    width:'60px',height:'60px',borderRadius:'50%',background:'#fff',
    transition:'background .08s'
  });
  shutterWrap.appendChild(shutterInner);
  shutterWrap.addEventListener('mousedown',()=>{shutterWrap.style.transform='scale(.95)';shutterInner.style.background='#ddd';});
  shutterWrap.addEventListener('mouseup',()=>{shutterWrap.style.transform='';shutterInner.style.background='#fff';});
  shutterWrap.addEventListener('touchstart',()=>{shutterWrap.style.transform='scale(.95)';shutterInner.style.background='#ddd';},{passive:true});
  shutterWrap.addEventListener('touchend',()=>{shutterWrap.style.transform='';shutterInner.style.background='#fff';});
  shutterWrap.addEventListener('click',()=>capture());
  botBar.appendChild(shutterWrap);

  const flipBtn=iconBtn(
    `<svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M3 8C3 6.34 4.34 5 6 5H8L9.5 3H12.5L14 5H16C17.66 5 19 6.34 19 8V15C19 16.66 17.66 18 16 18H6C4.34 18 3 16.66 3 15V8Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><path d="M14 11.5L11 14L8 11.5M8 11.5C8 9.57 9.57 8 11.5 8C12.7 8 13.76 8.6 14.4 9.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
    ()=>flip(),
    {label:'Switch camera'}
  );
  Object.assign(flipBtn.style,{width:'46px',height:'46px'});
  botBar.appendChild(flipBtn);

  ov.appendChild(botBar);

  const errBox=document.createElement('div');
  Object.assign(errBox.style,{
    position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-50%)',
    background:'rgba(0,0,0,.85)',color:'#fff',padding:'20px 26px',
    borderRadius:'14px',fontSize:'14px',textAlign:'center',
    maxWidth:'320px',display:'none',zIndex:'20'
  });
  ov.appendChild(errBox);
  const showErr=(msg)=>{errBox.textContent=msg;errBox.style.display='block';};

  document.body.appendChild(ov);

  let stream=null;
  let track=null;

  async function start(facing){
    stop();
    try{
      stream=await navigator.mediaDevices.getUserMedia({
        video:{facingMode:{ideal:facing},width:{ideal:1920},height:{ideal:1080}},
        audio:false
      });
      video.srcObject=stream;
      track=stream.getVideoTracks()[0];
      await video.play();
      // Wait for video dimensions to be ready (race-safe for capture())
      if(!video.videoWidth){
        await new Promise(res=>{
          const t=setTimeout(res,1500);
          video.addEventListener('loadedmetadata',()=>{clearTimeout(t);res();},{once:true});
        });
      }
      applyMirror();
      const caps=track.getCapabilities?track.getCapabilities():{};
      flashBtn.style.display=(caps.torch||facing==='environment')?'inline-flex':'none';
      if(caps.torch&&S.camFlash){await applyTorch();}
    }catch(err){
      const msg=(err&&err.name==='NotAllowedError')
        ?'Camera permission denied. Allow access in Safari settings.'
        :(err&&err.name==='NotFoundError')
        ?'No camera found on this device.'
        :'Could not open camera.';
      showErr(msg+'\nTap × to close.');
    }
  }

  async function applyTorch(){
    if(!track)return;
    try{
      const caps=track.getCapabilities?track.getCapabilities():{};
      if(!caps.torch)return;
      await track.applyConstraints({advanced:[{torch:S.camFlash}]});
    }catch(_){}
  }

  function applyMirror(){
    const shouldMirror=(S.camFacing==='user')&&S.camMirror;
    video.style.transform=shouldMirror?'scaleX(-1)':'';
  }

  function stop(){
    if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;track=null;}
    video.srcObject=null;
  }

  async function flip(){
    S.camFacing=S.camFacing==='environment'?'user':'environment';
    persist();
    mirrorBtn.style.display=S.camFacing==='user'?'inline-flex':'none';
    await start(S.camFacing);
  }

  async function capture(){
    if(!stream||!video.videoWidth){showErr('Camera not ready yet.');return;}
    try{
      const cnv=document.createElement('canvas');
      cnv.width=video.videoWidth;
      cnv.height=video.videoHeight;
      const ctx=cnv.getContext('2d');
      if((S.camFacing==='user')&&S.camMirror){
        ctx.translate(cnv.width,0);ctx.scale(-1,1);
      }
      ctx.drawImage(video,0,0,cnv.width,cnv.height);
      const raw=cnv.toDataURL('image/jpeg',0.92);
      // Storage compression: 700px / q=0.72 — ~300 PPI in the report's ~2.3" cell (sharp), ~35-45 KB each.
      // Photos now live in IndexedDB (not localStorage base64), so the higher quality no longer fights a 5MB cap.
      const compressed=await _photoToJpeg(raw,700,null,0.72);
      const finalUrl=(compressed&&compressed.dataUrl)||raw;
      const flashEl=document.createElement('div');
      Object.assign(flashEl.style,{position:'absolute',inset:'0',background:'#fff',opacity:'0.85',zIndex:'15',pointerEvents:'none',transition:'opacity .25s'});
      ov.appendChild(flashEl);
      setTimeout(()=>{flashEl.style.opacity='0';},10);
      setTimeout(()=>{flashEl.remove();cleanup(finalUrl);},220);
    }catch(err){showErr('Capture failed: '+err.message);}
  }

  function cleanup(result){
    stop();
    document.removeEventListener('keydown',escHandler);
    if(ov.parentNode)ov.remove();
    if(result&&typeof onCapture==='function'){
      try{onCapture(result);}catch(_){}
    }
  }

  const escHandler=(e)=>{
    if(e.key==='Escape'){e.preventDefault();cleanup(null);}
  };
  document.addEventListener('keydown',escHandler);

  await start(S.camFacing);
  mxFocusTrap(ov);
}

function _fallbackFilePicker(onCapture){
  const inp=document.createElement('input');
  inp.type='file';inp.accept='image/*';inp.capture='environment';inp.style.display='none';
  let done=false;
  const cleanup=()=>{ if(done)return; done=true; try{inp.remove();}catch(e){} window.removeEventListener('focus',onFocus); };
  function onFocus(){ setTimeout(cleanup,800); }   // remove when the dialog closes (select OR cancel) — replaces the fixed 5s timeout that could abort a slow camera selection
  inp.addEventListener('change',e=>{
    const file=e.target.files&&e.target.files[0];
    if(file){
      const r=new FileReader();
      r.onload=async ev=>{
        // Same storage compression as live camera capture (700px / q=0.72).
        const compressed=await _photoToJpeg(ev.target.result,700,null,0.72);
        if(typeof onCapture==='function')onCapture((compressed&&compressed.dataUrl)||ev.target.result);
      };
      r.readAsDataURL(file);
    }
    cleanup();
  });
  window.addEventListener('focus',onFocus);
  document.body.appendChild(inp);inp.click();
}

/* ════════════════════════════════════════════════════════════
   PHOTO STORE — item photos live in IndexedDB as JPEG Blobs.
   ────────────────────────────────────────────────────────────
   Why: photos used to be base64 data URLs serialized inside mx_jobs in
   localStorage, which blew the ~5MB cap fast and forced harsh compression.
   Now the bytes live in IndexedDB (no practical cap, no base64 +33% tax,
   async so it never janks the main thread) and mx_jobs holds only a tiny
   string reference per photo.

   Reference format: "idb:<uuid>". Anything that is NOT an idb: ref (i.e. a
   raw "data:" URL) is treated as inline/legacy and shown directly — this is
   the graceful-degrade path when IndexedDB is unavailable (e.g. iOS private
   mode) and the bridge that lets old exports / un-migrated jobs keep working.

   Orphan cleanup is by garbage collection (mxPhotoGC): a blob is deleted only
   when NO saved job and NOT the working quote reference it. GC runs on cold
   boot and ~10s after a job delete (past the undo window) — never eagerly, so
   the delete-undo can always restore.
   ════════════════════════════════════════════════════════════ */
const _MX_IDB_NAME='mxPhotos', _MX_IDB_STORE='photos';
let _mxIdbPromise;   // cached open (undefined = not yet opened; resolves to IDBDatabase|null)
function mxIdb(){
  if(_mxIdbPromise!==undefined) return _mxIdbPromise;
  _mxIdbPromise=new Promise((resolve)=>{
    try{
      if(!('indexedDB' in window)||!window.indexedDB){ resolve(null); return; }
      const req=indexedDB.open(_MX_IDB_NAME,1);
      req.onupgradeneeded=()=>{ try{ const db=req.result; if(!db.objectStoreNames.contains(_MX_IDB_STORE)) db.createObjectStore(_MX_IDB_STORE,{keyPath:'id'}); }catch(_){ } };
      req.onsuccess=()=>resolve(req.result||null);
      req.onerror=()=>resolve(null);
      req.onblocked=()=>resolve(null);
    }catch(_){ resolve(null); }
  });
  return _mxIdbPromise;
}
function _mxIsRef(v){ return typeof v==='string' && v.lastIndexOf('idb:',0)===0; }
function _mxNewId(){
  const r=(window.crypto&&crypto.randomUUID)?crypto.randomUUID():(Date.now().toString(36)+'-'+Math.random().toString(36).slice(2));
  return 'idb:'+r;
}
function _dataURLtoBlob(dataUrl){
  try{
    const i=dataUrl.indexOf(','); if(i<0) return null;
    const mime=(dataUrl.slice(0,i).match(/data:([^;]+)/)||[])[1]||'image/jpeg';
    const bin=atob(dataUrl.slice(i+1)); const len=bin.length; const arr=new Uint8Array(len);
    for(let j=0;j<len;j++) arr[j]=bin.charCodeAt(j);
    return new Blob([arr],{type:mime});
  }catch(_){ return null; }
}
function _blobToDataURL(blob){ return new Promise((res)=>{ try{ const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=()=>res(null); r.readAsDataURL(blob); }catch(_){ res(null); } }); }

// Store a JPEG data URL. Resolves to an "idb:" ref on success, or — if IndexedDB
// is unavailable or the write fails — the ORIGINAL data URL (graceful degrade;
// the caller stores whatever it gets back, so a photo is never lost).
function mxPhotoStore(dataUrl){
  return mxIdb().then(db=>{
    if(!db || typeof dataUrl!=='string' || dataUrl.lastIndexOf('data:',0)!==0) return dataUrl;
    const blob=_dataURLtoBlob(dataUrl);
    if(!blob) return dataUrl;
    const id=_mxNewId();
    return new Promise((resolve)=>{
      try{
        const tx=db.transaction(_MX_IDB_STORE,'readwrite');
        tx.objectStore(_MX_IDB_STORE).put({id, blob});
        tx.oncomplete=()=>resolve(id);
        tx.onerror=()=>resolve(dataUrl);
        tx.onabort=()=>resolve(dataUrl);
      }catch(_){ resolve(dataUrl); }
    });
  }).catch(()=>dataUrl);
}
function mxPhotoGetBlob(id){
  return mxIdb().then(db=>{ if(!db) return null;
    return new Promise((resolve)=>{ try{
      const rq=db.transaction(_MX_IDB_STORE,'readonly').objectStore(_MX_IDB_STORE).get(id);
      rq.onsuccess=()=>resolve(rq.result?rq.result.blob:null);
      rq.onerror=()=>resolve(null);
    }catch(_){ resolve(null); } });
  }).catch(()=>null);
}
function mxPhotoGetDataURL(id){ return mxPhotoGetBlob(id).then(b=>b?_blobToDataURL(b):null); }

// Garbage-collect blobs no saved job and not the working quote reference.
function mxPhotoGC(){
  return mxIdb().then(db=>{ if(!db) return;
    const refs=new Set();
    try{ (safeParse(ls("mx_jobs","[]"),[])||[]).forEach(j=>{ const ph=(j&&j.itemPhotos)||{}; Object.keys(ph).forEach(k=>{ if(_mxIsRef(ph[k])) refs.add(ph[k]); }); }); }catch(_){ }
    try{ const ph=S.itemPhotos||{}; Object.keys(ph).forEach(k=>{ if(_mxIsRef(ph[k])) refs.add(ph[k]); }); }catch(_){ }
    // Also protect the in-progress DRAFT's photos (an unsaved quote isn't in mx_jobs yet).
    try{ const dd=safeParse(lsGet("mx_draft"),null); const ph=(dd&&dd.itemPhotos)||{}; Object.keys(ph).forEach(k=>{ if(_mxIsRef(ph[k])) refs.add(ph[k]); }); }catch(_){ }
    try{
      const store=db.transaction(_MX_IDB_STORE,'readwrite').objectStore(_MX_IDB_STORE);
      const cur=store.openCursor();
      cur.onsuccess=(e)=>{ const c=e.target.result; if(!c) return; if(!refs.has(c.key)){ try{ store.delete(c.key); }catch(_){ } } c.continue(); };
    }catch(_){ }
  }).catch(()=>{});
}

// One-time, idempotent, LOSSLESS migration of legacy inline-base64 photos in
// mx_jobs into IndexedDB. A job's base64 is dropped ONLY after its blob is
// confirmed written; if IndexedDB is unavailable or any single write fails, the
// original base64 is kept untouched (no data loss). Safe to run repeatedly.
function mxPhotoMigrate(){
  return mxIdb().then(async (db)=>{
    if(!db) return false;
    let jobs; try{ jobs=safeParse(ls("mx_jobs","[]"),[]); }catch(_){ return false; }
    if(!Array.isArray(jobs)||!jobs.length) return false;
    let changed=false;
    for(const job of jobs){
      const ph=job&&job.itemPhotos;
      if(!ph||typeof ph!=='object') continue;
      for(const k of Object.keys(ph)){
        const v=ph[k];
        if(typeof v==='string' && v.lastIndexOf('data:',0)===0){
          const ref=await mxPhotoStore(v);           // writes the blob, returns an idb: ref (or the data URL on failure)
          if(_mxIsRef(ref)){ ph[k]=ref; changed=true; }   // only drop base64 once the blob is safely stored
        }
      }
    }
    if(changed){
      if(lsSet("mx_jobs", JSON.stringify(jobs))){ S.savedJobs=jobs; try{ render(); }catch(_){ } }   // reflect refs + free base64 from memory
    }
    return changed;
  }).catch(()=>false);
}

// Return a deep-enough copy of a job with its photos INLINED as base64 (for
// export portability). idb: refs are resolved to data URLs; data: URLs pass
// through. Keeps exports self-contained so they import + re-migrate on any device.
function mxInlineJobPhotos(job){
  return new Promise(async (resolve)=>{
    try{
      const out=Object.assign({}, job);
      const src=job&&job.itemPhotos||{};
      const ph={};
      for(const k of Object.keys(src)){
        const v=src[k];
        if(_mxIsRef(v)){ const d=await mxPhotoGetDataURL(v); ph[k]=d||''; if(!d) delete ph[k]; }   // drop only if truly unreadable
        else ph[k]=v;
      }
      out.itemPhotos=ph;
      resolve(out);
    }catch(_){ resolve(job); }
  });
}

// ── Display cache: resolve a photo ref to a URL for <img>, loading async. ──
const _photoURLCache=new Map();    // ref/id -> objectURL or data URL (string)
const _photoPending=new Set();
let _photoRenderQueued=false;
function _queuePhotoRender(){
  if(_photoRenderQueued) return;
  _photoRenderQueued=true;
  Promise.resolve().then(()=>{ _photoRenderQueued=false; try{ render(); }catch(_){ } });   // coalesce; morphdom slots the loaded photo in cheaply
}
// {url, ready}. data: URLs render immediately; idb: refs load from IndexedDB and
// trigger a re-render when ready (placeholder shows meanwhile — no layout jump).
function resolvePhoto(val){
  if(typeof val!=='string' || !val) return {url:null, ready:true};
  if(!_mxIsRef(val)) return {url:val, ready:true};
  if(_photoURLCache.has(val)) return {url:_photoURLCache.get(val), ready:true};
  if(!_photoPending.has(val)){
    _photoPending.add(val);
    mxPhotoGetBlob(val).then(blob=>{
      _photoPending.delete(val);
      if(blob){ try{ _photoURLCache.set(val, URL.createObjectURL(blob)); }catch(_){ } _queuePhotoRender(); }
    });
  }
  return {url:null, ready:false};
}
// For the PDF report: full stored quality, NO re-encode. Resolves {dataUrl,w,h,format}.
function _photoForReport(val){
  return new Promise(async (resolve)=>{
    try{
      let dataUrl=null;
      if(_mxIsRef(val)) dataUrl=await mxPhotoGetDataURL(val);
      else if(typeof val==='string' && val.lastIndexOf('data:',0)===0) dataUrl=val;
      if(!dataUrl){ resolve(null); return; }
      const img=new Image();
      img.onload=()=>resolve({dataUrl, w:img.naturalWidth||img.width, h:img.naturalHeight||img.height, format:'JPEG'});
      img.onerror=()=>resolve(null);
      img.src=dataUrl;
    }catch(_){ resolve(null); }
  });
}

// Recompress a photo data URL via canvas so the resulting PDF stays small.
// Also center-crops to a target aspect ratio (boxW/boxH) so the image fits
// the photo cell exactly — eliminates bleed past the cell border.
// Returns a Promise that resolves to { dataUrl, format, w, h }.
function _photoToJpeg(src,maxDim,targetAspect,quality){
  // quality defaults to 0.82 for back-compat with existing call sites that don't pass it
  const q=(typeof quality==='number'&&quality>0&&quality<=1)?quality:0.82;
  return new Promise((resolve)=>{
    const img=new Image();
    img.onload=()=>{
      try{
        const sw=img.naturalWidth||img.width;
        const sh=img.naturalHeight||img.height;
        if(!sw||!sh){resolve(null);return;}

        // Decide source crop rect that matches targetAspect (cover-style)
        let srcX=0, srcY=0, srcW=sw, srcH=sh;
        if(targetAspect && targetAspect>0){
          const imgAspect=sw/sh;
          if(imgAspect>targetAspect){
            // image too wide -> crop sides
            srcW=Math.round(sh*targetAspect);
            srcX=Math.round((sw-srcW)/2);
          } else if(imgAspect<targetAspect){
            // image too tall -> crop top/bottom
            srcH=Math.round(sw/targetAspect);
            srcY=Math.round((sh-srcH)/2);
          }
        }

        // Output canvas: scale the cropped region so its longest edge ≤ maxDim
        const scale=Math.min(1, maxDim/Math.max(srcW,srcH));
        const cw=Math.max(1,Math.round(srcW*scale));
        const ch=Math.max(1,Math.round(srcH*scale));
        const cnv=document.createElement('canvas');
        cnv.width=cw;cnv.height=ch;
        const ctx=cnv.getContext('2d');
        // Fill white (JPEG can't store alpha)
        ctx.fillStyle='#FFFFFF';ctx.fillRect(0,0,cw,ch);
        ctx.drawImage(img,srcX,srcY,srcW,srcH,0,0,cw,ch);
        const out=cnv.toDataURL('image/jpeg',q);
        resolve({dataUrl:out,format:'JPEG',w:cw,h:ch});
      }catch(e){resolve(null);}
    };
    img.onerror=()=>resolve(null);
    img.src=src;
  });
}

async function _buildPhotoReportPDF(){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'portrait',unit:'pt',format:'letter'});

  const today=new Date().toLocaleDateString("en-US",{year:"numeric",month:"long",day:"numeric"});
  const qn=S.quoteNum||("QT-"+Date.now().toString().slice(-6));
  const custLine=[S.custAddress,S.custCity].filter(Boolean).join(", ");

  // ── Page geometry (pt; letter = 612 × 792) ──
  const PW=612, PH=792;
  const ML=22, MR=22, MT=22, MB=22;        // 0.3" margins ≈ 22pt
  const CW=PW-ML-MR;                       // content width

  // Header / footer bands
  const HDR_H=82;                          // tall header: brand + title + customer + meta
  const FTR_H=16;
  const GAP_HDR=8;
  const GAP_FTR=6;

  // Grid area
  const gridTop=MT+HDR_H+GAP_HDR;
  const gridBottom=PH-MB-FTR_H-GAP_FTR;
  const gridH=gridBottom-gridTop;          // total vertical space for grid
  // 3×3 layout: narrower cells fit portrait phone photos with minimal letterbox
  const COLS=3, ROWS=3, CELLS_PER_PAGE=COLS*ROWS;
  const CELL_GAP=4;
  const cellW=(CW-CELL_GAP*(COLS-1))/COLS;
  const cellH=(gridH-CELL_GAP*(ROWS-1))/ROWS;

  // Photo vs info split inside each cell
  const PHOTO_FRAC=0.80;
  const photoH=cellH*PHOTO_FRAC;
  const infoH=cellH-photoH;

  const hex=h=>[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];
  const fill=h=>{const[r,g,b]=hex(h);doc.setFillColor(r,g,b);};
  const stroke=h=>{const[r,g,b]=hex(h);doc.setDrawColor(r,g,b);};
  const color=h=>{const[r,g,b]=hex(h);doc.setTextColor(r,g,b);};
  const ltext=(s,x,y)=>doc.text(String(s||''),x,y);
  const rtext=(s,x,y)=>doc.text(String(s||''),x,y,{align:'right'});

  // Truncate a string so it fits a width (in pt) at the current font size.
  const fitText=(s,maxW)=>{
    s=String(s||'');
    if(doc.getTextWidth(s)<=maxW)return s;
    const ell='…';
    while(s.length>1 && doc.getTextWidth(s+ell)>maxW) s=s.slice(0,-1);
    return s+ell;
  };

  // Build flat photo list (skip items that no longer exist)
  const photos=Object.entries(S.itemPhotos||{});
  const photoList=[];
  photos.forEach(([idxStr,src])=>{
    const i=parseInt(idxStr);
    const it=S.items[i];
    if(!it)return;
    const label=it.label||(dispSeries(it)+" "+(typeof dispType==='function'?dispType(it.type):it.type));
    const spec=it.width+'"W \u00d7 '+it.height+'"H \u00b7 '+it.frame+' \u00b7 '+it.color+(it.type==="Combination"?(' \u00b7 '+comboSummary(it)):'');
    const adderList=(it.adders&&it.adders.length>0)
      ? it.adders.map(k=>adderLbl(k,it)).join(", ")
      : "";
    const noteStr=it.note||"";
    photoList.push({i,src,label,spec,adderList,noteStr,qty:it.qty});
  });

  if(!photoList.length){alert("No photos match current items.");return;}

  // Embed each photo at FULL stored quality — no re-encode. (The old code re-ran
  // _photoToJpeg at 900px, but the source was already ≤500px so it only added a
  // 3rd lossy JPEG generation. Now we pull the stored bytes straight from IndexedDB.)
  // drawCell uses contain-fit (object-fit:contain) via proc.w/proc.h.
  const processed=[];
  for(const ph of photoList){
    const r=await _photoForReport(ph.src);
    processed.push(r);
  }

  const totalPages=Math.ceil(photoList.length/CELLS_PER_PAGE);

  const drawHeader=(pageNum)=>{
    // ── Brand mark: ● maximus ● / project.designer (mono + coral dots) ──
    const _bmkY=MT+11;
    fill('#E07856');
    doc.setFont('courier','bold'); doc.setFontSize(14); color('#0A0A0B');
    const _mxW=doc.getTextWidth('maximus');
    doc.circle(ML+3, _bmkY-3.5, 2, 'F');
    ltext('maximus', ML+10, _bmkY);
    doc.circle(ML+10+_mxW+5, _bmkY-3.5, 2, 'F');
    doc.setFont('courier','normal'); doc.setFontSize(6); color('#94A3B8');
    doc.setCharSpace(0.8);
    ltext('project.designer', ML, _bmkY+9);
    doc.setCharSpace(0);

    // ── Row 2: "PROJECT PHOTOS" title left · customer block right ──
    doc.setFont('helvetica','bold'); doc.setFontSize(12); color('#1A1A2A');
    doc.setCharSpace(2);
    ltext('PROJECT PHOTOS', ML, MT+44);
    doc.setCharSpace(0);

    let ry = MT+15;
    if(S.custName){
      doc.setFont('helvetica','bold'); doc.setFontSize(12); color('#0A0A0B');
      rtext(fitText(S.custName, CW*0.55), ML+CW, ry);
      ry += 12;
    }
    if(custLine){
      doc.setFont('helvetica','normal'); doc.setFontSize(9); color('#444444');
      rtext(fitText(custLine, CW*0.55), ML+CW, ry);
      ry += 10;
    }
    if(S.custZip){
      doc.setFont('helvetica','normal'); doc.setFontSize(9); color('#444444');
      rtext(String(S.custZip), ML+CW, ry);
    }

    // Divider between the title row and the meta row
    const midY = MT + 56;
    stroke('#CBD5E0'); doc.setLineWidth(0.75);
    doc.line(ML, midY, ML+CW, midY);

    // ── Row 3: subline left · quote # / date right ──
    const botY = midY + 14;
    doc.setFont('helvetica','normal'); doc.setFontSize(8); color('#94A3B8');
    ltext('Site Photo Report', ML, botY);

    doc.setFont('helvetica','normal'); doc.setFontSize(8); color('#64748B');
    rtext(qn+' \u00b7 '+today, ML+CW, botY);

    // Bottom underline of header band
    stroke('#0A0A0B'); doc.setLineWidth(1.2);
    doc.line(ML, MT+HDR_H, ML+CW, MT+HDR_H);
  };

  const drawFooter=(pageNum)=>{
    const fy=PH-MB-FTR_H;
    stroke('#E2E8F0'); doc.setLineWidth(0.75);
    doc.line(ML, fy, ML+CW, fy);
    doc.setFont('helvetica','normal'); doc.setFontSize(6.5); color('#94A3B8');
    ltext('MAXIMUS PRO \u2014 Internal Use', ML, fy+10);
    rtext('Page '+pageNum+' of '+totalPages, ML+CW, fy+10);
  };

  const drawCell=(ph,proc,cx,cy)=>{
    // Photo background (also shows as the letterbox/pillarbox padding)
    fill('#F1F5F9');
    doc.rect(cx,cy,cellW,photoH,'F');

    // Object-fit:contain — fit the whole photo inside the box, centered.
    if(proc && proc.dataUrl){
      try{
        const iw=proc.w, ih=proc.h;
        const boxRatio=cellW/photoH;
        const imgRatio=iw/ih;
        let dW, dH;
        if(imgRatio>boxRatio){
          // image wider than box -> match width, letterbox top/bottom
          dW=cellW; dH=dW/imgRatio;
        } else {
          // image taller/equal -> match height, pillarbox left/right
          dH=photoH; dW=dH*imgRatio;
        }
        const dx=cx+(cellW-dW)/2;
        const dy=cy+(photoH-dH)/2;
        doc.addImage(proc.dataUrl,'JPEG',dx,dy,dW,dH,undefined,'FAST');
      }catch(e){/* skip on error */}
    }

    // Info band
    fill('#FFFFFF');
    doc.rect(cx,cy+photoH,cellW,infoH,'F');
    // Divider between photo and info band
    stroke('#E2E8F0'); doc.setLineWidth(0.75);
    doc.line(cx,cy+photoH,cx+cellW,cy+photoH);
    // Outer cell border on top
    stroke('#E2E8F0'); doc.setLineWidth(0.75);
    doc.roundedRect(cx,cy,cellW,cellH,3,3,'S');

    // ── Two-column info layout ─────────────────────────────
    // Left (40%): ITEM N + label
    // Right (60%): spec + adders/note — right-aligned
    const padX=5;
    const leftX=cx+padX;
    const rightX=cx+cellW-padX;
    const leftInner=cellW*0.40 - padX - 2;
    const rightInner=cellW*0.60 - padX - 2;

    // Left column — top row: ITEM N ×Q
    let lty=cy+photoH+8;
    doc.setFont('helvetica','bold'); doc.setFontSize(5.5); color('#94A3B8');
    ltext('ITEM '+(ph.i+1)+(ph.qty>1?(' \u00d7'+ph.qty):''), leftX, lty);
    lty+=8;
    // Left column — bottom row: label (bold, dark)
    doc.setFont('helvetica','bold'); doc.setFontSize(8); color('#1A1A2A');
    ltext(fitText(ph.label,leftInner), leftX, lty);

    // Right column — top row: spec (gray)
    let rty=cy+photoH+9.5;
    doc.setFont('helvetica','normal'); doc.setFontSize(6.5); color('#64748B');
    rtext(fitText(ph.spec,rightInner), rightX, rty);
    rty+=8;
    // Right column — bottom row: adders (blue) OR note (italic) — adders take priority
    if(ph.adderList){
      doc.setFont('helvetica','normal'); doc.setFontSize(6); color('#3B5A8A');
      rtext(fitText(ph.adderList,rightInner), rightX, rty);
    } else if(ph.noteStr){
      doc.setFont('helvetica','italic'); doc.setFontSize(6); color('#888888');
      rtext(fitText(ph.noteStr,rightInner), rightX, rty);
    }
  };

  // Render pages
  for(let p=0;p<photoList.length;p+=CELLS_PER_PAGE){
    if(p>0) doc.addPage();
    const pageNum=Math.floor(p/CELLS_PER_PAGE)+1;
    drawHeader(pageNum);
    const chunk=photoList.slice(p,p+CELLS_PER_PAGE);
    const procChunk=processed.slice(p,p+CELLS_PER_PAGE);
    for(let k=0;k<chunk.length;k++){
      const col=k%COLS, row=Math.floor(k/COLS);
      const cx=ML+col*(cellW+CELL_GAP);
      const cy=gridTop+row*(cellH+CELL_GAP);
      drawCell(chunk[k],procChunk[k],cx,cy);
    }
    // Draw empty placeholders for unfilled slots on the last page
    for(let k=chunk.length;k<CELLS_PER_PAGE;k++){
      const col=k%COLS, row=Math.floor(k/COLS);
      const cx=ML+col*(cellW+CELL_GAP);
      const cy=gridTop+row*(cellH+CELL_GAP);
      fill('#FAFAFA'); stroke('#E2E8F0'); doc.setLineWidth(0.75);
      // Dashed border for empty
      const prevDash=doc.getLineDashPattern?doc.getLineDashPattern():null;
      try{doc.setLineDashPattern([2,2],0);}catch(_){}
      doc.roundedRect(cx,cy,cellW,cellH,3,3,'FD');
      try{doc.setLineDashPattern([],0);}catch(_){}
    }
    drawFooter(pageNum);
  }

  doc.save('PhotoReport-'+qn+'.pdf');
}

function doPrintEstimate(){

function _doPrintEstimateImpl(){
  const D=derived();
  const PKG=parseFloat(S.pkgRate)||0;
  const mup=(parseFloat(S.markupPct)||0)/100;
  const discAmt=D.discAmt;
  const permitAmt=S.permitEnabled?(parseFloat(S.permitFee)||0):0;
  const fp=Math.max(0,D.salePrice-discAmt+permitAmt);
  const r=(parseFloat(S.financeRate)||0)/100/12,n=parseInt(S.financeTerm)||60;
  // Guard: a $ discount larger than the sale price can push fp ≤ 0, which would yield a NaN/negative monthly payment.
  const _fpForFin=Math.max(0,fp);
  const mo=_fpForFin<=0?0:(r===0?_fpForFin/n:_fpForFin*r*Math.pow(1+r,n)/(Math.pow(1+r,n)-1));
  const today=new Date().toLocaleDateString("en-US",{year:"numeric",month:"long",day:"numeric"});
  const qn=S.quoteNum||("QT-"+Date.now().toString().slice(-6));
  loadJsPDF()
    .then(()=>{_buildEstimatePDF(D,PKG,mup,discAmt,permitAmt,fp,r,n,mo,today,qn);})
    .catch(()=>alert('Could not load PDF library. Check your internet connection.'));
}

function _loadEmailTemplates(){
  const def=_defaultEmailTemplates();
  const saved=safeParse(lsGet("mx_email_templates"),null);
  if(!saved||typeof saved!=="object")return def;
  // Accept the single-object format; migrate the older 3-slot array format (use the active slot).
  const pick=(v,d,activeIdx)=>{
    if(Array.isArray(v)){ const i=Math.max(0,Math.min(2,parseInt(activeIdx)||0)); const t=(v[i]&&((String(v[i].subject||"").trim())||(String(v[i].body||"").trim())))?v[i]:(v.find(x=>x&&((String(x.subject||"").trim())||(String(x.body||"").trim())))||d); return {subject:String(t.subject||d.subject),body:String(t.body||d.body)}; }
    if(v&&typeof v==="object") return {subject:String(v.subject||d.subject),body:String(v.body||d.body)};
    return d;
  };
  return { quote:pick(saved.quote,def.quote,saved.activeQuote), thankyou:pick(saved.thankyou,def.thankyou,saved.activeThankyou) };
}
function _activeEmailTemplate(type){
  const t=S.emailTemplates||_defaultEmailTemplates();
  let tpl=(type==="thankyou")?t.thankyou:t.quote;
  if(!tpl||!((tpl.subject&&tpl.subject.trim())||(tpl.body&&tpl.body.trim()))){ const d=_defaultEmailTemplates(); tpl=(type==="thankyou")?d.thankyou:d.quote; }   // never send a blank
  return tpl;
}
function _fillTemplate(str){
  const first=((S.custName||"").trim().split(/\s+/)[0])||"there";
  const name=(S.custName||"").trim()||"there";
  const rep=(S.repName||"Peter Paik").trim();
  const co=(S.coName||"SoCal Window Pros");
  const phone=S.repPhone?((typeof formatPhone==='function')?formatPhone(S.repPhone):(""+S.repPhone).trim()):"";
  return String(str==null?"":str)
    .replace(/\{first\}/gi,first).replace(/\{name\}/gi,name)
    .replace(/\{rep\}/gi,rep).replace(/\{company\}/gi,co).replace(/\{co\}/gi,co)
    .replace(/\{phone\}/gi,phone);
}
// Builds the mailto: URL from the active template (split out so it's unit-testable without navigating away).
function _thankYouMailtoURL(forceTY){
  const tpl=_activeEmailTemplate(forceTY?"thankyou":"quote");
  const subject=_fillTemplate(tpl.subject).replace(/[\r\n]+/g," ").replace(/\s+/g," ").trim();
  // Fill, normalize newlines, drop a dangling blank line left by an empty {phone}, collapse 3+ blanks.
  const body=_fillTemplate(tpl.body).replace(/\r\n?/g,"\n").replace(/[ \t]+\n/g,"\n").replace(/\n{3,}/g,"\n\n").replace(/\s+$/,"");
  // Encode the address (keeping the literal @) so a stray space or reserved char can't malform the mailto URL.
  const to=encodeURIComponent((S.custEmail||"").trim()).replace(/%40/g,"@");
  // Join with CRLF (\r\n → %0D%0A). The Gmail iOS app collapses lone \n (%0A) into one run-on
  // paragraph; CRLF is the standards-correct mailto line break and renders right in Gmail + Apple Mail.
  return "mailto:"+to+"?subject="+encodeURIComponent(subject)+"&body="+encodeURIComponent(body.split("\n").join("\r\n"));
}
function _openThankYouMail(forceTY){
  const url=_thankYouMailtoURL(forceTY);
  // Embedded in the CRM iframe: browsers block launching mailto: from a subframe, so the email
  // never opens. Hand it to the TOP window instead (same-origin, still within this click's user
  // gesture). mailto: hands off to the mail app — the page itself doesn't navigate or reload.
  try{ if(window.top && window.top!==window.self){ window.top.location.href=url; return; } }catch(_){}
  const a=document.createElement("a");a.href=url;a.style.display="none";document.body.appendChild(a);
  a.click();
  setTimeout(()=>{try{a.remove();}catch(e){}},150);
}
// Hold-to-email (3-second hold on "Email to Client"): open the thank-you template directly — NO PDF, NO "attached" line.

}

// ── Anlin cover page (Print Quote) ───────────────────────────────────────────
// Independent of the Anlin logo. coverMode: auto = include when an Anlin product is in the quote; on/off = force.
function coverIncluded(){ const m=S.coverMode||"off"; return m==="on"?true:m==="off"?false:quoteHasAnlin(); }
// Cover PDF is now a lazily-fetched static asset (/cover.pdf) instead of an inline ~270KB base64 blob.
// Bytes are cached after the first fetch. Any fetch failure makes _saveQuotePDF fall back to quote-only.
let _coverBytesCache=null;
async function _coverBytes(){ if(_coverBytesCache)return _coverBytesCache; const r=await fetch('cover.pdf'); if(!r||!r.ok)throw new Error('cover.pdf fetch failed'); _coverBytesCache=new Uint8Array(await r.arrayBuffer()); return _coverBytesCache; }
// Save the Print Quote — merges the cover as page 1 (pdf-lib) when coverIncluded(); otherwise saves the quote alone.
function _saveQuotePDF(doc,qn){
  const name='Quote-'+qn+'.pdf';
  if(!coverIncluded()){ doc.save(name); return; }
  (async()=>{
    try{
      await loadPdfLib();   // lazy-load pdf-lib on first cover-merge
      const coverU=await _coverBytes();
      const {PDFDocument}=PDFLib;
      const merged=await PDFDocument.create();
      const cover=await PDFDocument.load(coverU);
      const quote=await PDFDocument.load(doc.output('arraybuffer'));
      for(const p of await merged.copyPages(cover,cover.getPageIndices())) merged.addPage(p);
      for(const p of await merged.copyPages(quote,quote.getPageIndices())) merged.addPage(p);
      const out=await merged.save();
      const url=URL.createObjectURL(new Blob([out],{type:'application/pdf'}));
      const a=document.createElement('a'); a.href=url; a.download=name; a.rel='noopener'; document.body.appendChild(a);
      setTimeout(()=>{ try{ a.dispatchEvent(new MouseEvent('click',{bubbles:true,cancelable:true,view:window})); }catch(_){ try{a.click();}catch(__){ try{window.open(url,'_blank');}catch(___){} } } setTimeout(()=>{try{a.remove();URL.revokeObjectURL(url);}catch(_){}} ,5000); },0);
    }catch(e){ try{doc.save(name);}catch(_){} }   // fallback: quote-only on any merge error
  })();
}
function _buildEstimatePDF(D,PKG,mup,discAmt,permitAmt,fp,r,n,mo,today,qn){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'portrait',unit:'pt',format:'letter'});

  const PW=612;
  const ML=36, MR=36, MT=24;

  const fill=h=>{const[r,g,b]=hexRGB(h);doc.setFillColor(r,g,b);};
  const stroke=h=>{const[r,g,b]=hexRGB(h);doc.setDrawColor(r,g,b);};
  const color=h=>{const[r,g,b]=hexRGB(h);doc.setTextColor(r,g,b);};
  const rtext=(s,x,yt)=>doc.text(String(s||''),x,yt,{align:'right'});
  const ltext=(s,x,yt)=>doc.text(String(s||''),x,yt);
  const ctext=(s,x,yt)=>doc.text(String(s||''),x,yt,{align:'center'});

  // ── HEADER ──

  // Company logo — small, left-aligned (matches reference layout)
  try {
    const _logoH = 46;
    const _logoW = _logoH * LOGO_ASPECT;
    const _logoX = ML;
    const _logoY = y + 8;
    doc.addImage(LOGO_DATA_URL, 'PNG', _logoX, _logoY, _logoW, _logoH, undefined, 'FAST');

/* ════════════════════════════════════════════════════════════
   morphdom integration — patch #app in place instead of innerHTML="".
   render() builds the new tree into a DETACHED buffer, then _mxMorph()
   diffs it onto the live #app so the DOM is patched, not torn down.
   Focus/caret/scroll on reused nodes are preserved automatically.

   Listener transfer: every addEventListener handler is recorded per-element
   (below). When morphdom REUSES a node it keeps that node's OLD listeners and
   discards the new node's — so without help a reused button would keep the
   stale closure from the previous render. _mxBeforeElUpdated swaps in this
   render's FRESH handlers so behavior stays correct.
   ════════════════════════════════════════════════════════════ */
const _MX_EVS='__mxEvs';
const _mxAEL=HTMLElement.prototype.addEventListener;
const _mxREL=HTMLElement.prototype.removeEventListener;
HTMLElement.prototype.addEventListener=function(t,h,o){
  if(typeof h==='function'){ (this[_MX_EVS]||(this[_MX_EVS]=[])).push([t,h,o]); }
  return _mxAEL.call(this,t,h,o);
};
HTMLElement.prototype.removeEventListener=function(t,h,o){
  const l=this[_MX_EVS];
  if(l){ for(let i=l.length-1;i>=0;i--){ if(l[i][0]===t&&l[i][1]===h){ l.splice(i,1); break; } } }
  return _mxREL.call(this,t,h,o);
};
function _mxBeforeElUpdated(fromEl,toEl){
  const fe=fromEl[_MX_EVS], te=toEl[_MX_EVS];
  if(fe){ for(let i=0;i<fe.length;i++) _mxREL.call(fromEl,fe[i][0],fe[i][1],fe[i][2]); fromEl[_MX_EVS]=null; }
  if(te){ for(let i=0;i<te.length;i++) fromEl.addEventListener(te[i][0],te[i][1],te[i][2]); }
  return true;
}
function _mxMorph(root,next){
  if(!root) return;
  // Defensive fallback: if morphdom failed to load, fall back to the old teardown.
  if(typeof morphdom!=='function'){ root.innerHTML=''; while(next.firstChild) root.appendChild(next.firstChild); return; }
  const a=document.activeElement;
  const isField=a&&(a.tagName==='INPUT'||a.tagName==='TEXTAREA')&&root.contains(a);
  let s0=null,s1=null;
  if(isField){ try{ s0=a.selectionStart; s1=a.selectionEnd; }catch(_){ } }
  morphdom(root,next,{childrenOnly:true,onBeforeElUpdated:_mxBeforeElUpdated});
  if(isField&&document.contains(a)){
    try{ if(document.activeElement!==a) a.focus({preventScroll:true}); if(s0!=null&&a.setSelectionRange) a.setSelectionRange(s0,s1); }catch(_){ }
  }
}
let _rendering=false, _rerenderQueued=false, _lastRenderScreen=null;
function _scrollTop(){ return window.scrollY||document.documentElement.scrollTop||document.body.scrollTop||0; }
function render(){
  // Re-entrancy guard: a `blur`/`focus` handler can fire render() WHILE morphdom is mid-patch
  // (e.g. morphdom removes a focused input → its blur handler calls render()). Re-entering morphdom
  // corrupts its node bookkeeping ("removeChild … no longer a child"). Defer instead, then re-run once.
  if(_rendering){ _rerenderQueued=true; return; }
  _rendering=true;
  // Preserve scroll across an IN-PLACE (same-screen) re-render. On iOS, re-rendering while a text
  // input is focused makes Safari scroll that input back into view (the "tapping a glass upgrade
  // jumps to the top" bug). We snap the page back to where it was. Scoped to same-screen renders so
  // navigation is unaffected, and skipped when an intentional scroll (scrollToLast) is pending.
  const _sameScreen = (S.screen===_lastRenderScreen);
  const _sy = _sameScreen ? _scrollTop() : null;
  try{
    // Build the screen into a detached buffer, then patch the live #app in place.
    const _buf=document.createElement("div");
    _renderImpl(_buf);
    _mxMorph(document.getElementById("app"), _buf);
  } finally { _rendering=false; }
  _lastRenderScreen=S.screen;
  if(_sy!=null && !S.scrollToLast){
    const _restore=()=>{ if(S.screen===_lastRenderScreen && Math.abs(_scrollTop()-_sy)>2){ try{ window.scrollTo(0,_sy); }catch(_){} } };
    _restore();                              // synchronous reflow scroll
    try{ requestAnimationFrame(_restore); }catch(_){}   // iOS scroll-into-view fires on the next frame
  }
  if(_rerenderQueued){ _rerenderQueued=false; render(); }
}

  ['Text Field 27','Text Field 28','Text Field 29','Text Field 30'],
  ['Text Field 34','Text Field 35','Text Field 36','Text Field 37'],
  ['Text Field 41','Text Field 42','Text Field 43','Text Field 44'],
  ['Text Field 48','Text Field 49','Text Field 50','Text Field 51'],
