<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <title>MAXIMUS PRO · Project Designer · Maskable (Android adaptive)</title>
  <defs>
    <linearGradient id="paneA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E8F0F5"/>
      <stop offset="0.55" stop-color="#9FC0D4"/>
      <stop offset="1" stop-color="#6D95B2"/>
    </linearGradient>
    <linearGradient id="paneB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#BFD4E0"/>
      <stop offset="0.55" stop-color="#7EA3BC"/>
      <stop offset="1" stop-color="#547D9C"/>
    </linearGradient>
    <linearGradient id="bgFull" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F2238"/>
      <stop offset="1" stop-color="#0A1628"/>
    </linearGradient>
  </defs>
  <!-- Full-bleed background (no rounded corners; OS applies the mask) -->
  <rect width="512" height="512" fill="url(#bgFull)"/>
  <!-- Window content shrunk into the safe zone (inner ~80%, centered) -->
  <!-- Safe zone roughly: 51px → 461px (~410 wide). Window scaled from 92-420 (328 wide) to 142-370 (228 wide) -->
  <g transform="translate(256,256) scale(0.7) translate(-256,-256)">
    <!-- 4 panes -->
    <rect x="108" y="108" width="138" height="138" rx="2" fill="url(#paneA)"/>
    <rect x="266" y="108" width="138" height="138" rx="2" fill="url(#paneA)"/>
    <rect x="108" y="266" width="138" height="138" rx="2" fill="url(#paneB)"/>
    <rect x="266" y="266" width="138" height="138" rx="2" fill="url(#paneB)"/>
    <!-- Highlights -->
    <rect x="120" y="118" width="34" height="8" rx="2" fill="#FFFFFF" opacity="0.35"/>
    <rect x="278" y="118" width="34" height="8" rx="2" fill="#FFFFFF" opacity="0.35"/>
    <!-- Outer frame -->
    <rect x="92" y="92" width="328" height="14" fill="#B8956A"/>
    <rect x="92" y="406" width="328" height="14" fill="#B8956A"/>
    <rect x="92" y="92" width="14" height="328" fill="#B8956A"/>
    <rect x="406" y="92" width="14" height="328" fill="#B8956A"/>
    <!-- Cross mullion -->
    <rect x="249" y="92" width="14" height="328" fill="#B8956A"/>
    <rect x="92" y="249" width="328" height="14" fill="#B8956A"/>
  </g>
</svg>
